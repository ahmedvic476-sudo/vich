<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563eb">
<meta name="description" content="Hybrid offline/online cafe management system">
<link rel="manifest" href="manifest.json">
<title>PlayStation Cafe Manager V5</title>
<style>
:root{--bg-primary:#020617;--bg-secondary:#111827;--bg-tertiary:#020617;--border-color:#334155;--text-primary:#fff;--text-muted:#94a3b8;--accent-blue:#2563eb;--accent-green:#22c55e;--accent-red:#ef4444;--card-shadow:0 15px 40px #0008;--brightness:100%}
*,*::before,*::after{box-sizing:border-box}
html.light-mode{--bg-primary:#f8fafc;--bg-secondary:#ffffff;--bg-tertiary:#f8fafc;--border-color:#d0d0d0;--text-primary:#111827;--text-muted:#475569;--accent-blue:#1e5ba8;--accent-green:#159b3d;--accent-red:#c41e1e;--card-shadow:0 8px 20px #0002}
html,body{margin:0;font-family:Tahoma,Arial;background:linear-gradient(180deg,#020617,#040b1b);color:var(--text-primary);background-color:var(--bg-primary);filter:brightness(var(--brightness));transition:background-color 0.3s,color 0.3s;min-width:0;overflow-x:hidden}
.content{background:rgba(15,23,42,0.95);border-radius:16px;margin:16px auto;max-width:1300px;width:min(100%,1300px);padding:18px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);box-shadow:0 28px 60px rgba(0,0,0,0.35);overflow-x:hidden}
.hidden{display:none!important}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:15px;background:linear-gradient(180deg,rgba(0,0,0,0.88),rgba(0,0,0,0.86)),url('./wallpaper.jpeg');background-size:cover;background-repeat:no-repeat;background-position:center top;filter:brightness(var(--brightness));width:100%}
.box,.card{background:rgba(15,23,42,0.96);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:18px;box-shadow:var(--card-shadow);transition:background-color 0.3s,border-color 0.3s;max-width:100%}
.light-mode .box,.light-mode .card{background:rgba(255,255,255,0.92);border-color:rgba(0,0,0,0.08)}
.light-mode .content{background:rgba(255,255,255,0.9);border-color:rgba(0,0,0,0.08)}
.box{width:min(430px,100%)}
input,select,button,textarea{font-family:inherit;font-size:15px;border-radius:12px;border:1px solid var(--border-color);padding:10px;background:var(--bg-tertiary);color:var(--text-primary);transition:background-color 0.3s,color 0.3s,border-color 0.3s;max-width:100%;box-sizing:border-box}
button{background:var(--accent-blue);border-color:var(--accent-blue);cursor:pointer;font-weight:bold;transition:all 0.3s}
.ok{background:var(--accent-green);border-color:var(--accent-green);color:#052e16}
.danger{background:var(--accent-red);border-color:var(--accent-red)}
.gray{background:var(--border-color)}
.app-logo{display:inline-flex;align-items:center;gap:10px}
.app-logo img{width:40px;height:40px;object-fit:contain;border-radius:14px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.08)}
.login-icon{display:flex;justify-content:center;margin-bottom:14px}
.login-icon img{width:68px;height:68px;object-fit:cover;border-radius:18px;border:2px solid rgba(255,255,255,0.22);box-shadow:0 16px 36px rgba(0,0,0,0.28)}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;min-width:0}
.row>*{min-width:0}
.col{display:flex;flex-direction:column;gap:7px;min-width:0}
.grid{display:grid;gap:12px;max-width:100%}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g5{grid-template-columns:repeat(5,1fr)}
.top{position:sticky;top:0;background:linear-gradient(180deg,rgba(2,6,23,0.94),rgba(2,6,23,0.92)),url('./wallpaper.jpeg');background-size:cover;background-position:center top;border-bottom:1px solid var(--border-color);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;z-index:10;backdrop-filter:blur(6px);width:100%}
.top>div:first-child{flex:1}
.top>div:last-child{display:flex;gap:8px;flex-wrap:wrap}
.tabs{display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;padding:10px;background:rgba(17,24,39,0.9);border-bottom:1px solid var(--border-color);scroll-behavior:smooth;backdrop-filter:blur(3px);-webkit-overflow-scrolling:touch}
.mobile-menu-btn{display:none;background:var(--accent-blue);color:white;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:16px}
.mobile-menu-btn::before{content:'☰';font-size:18px}
.tw{overflow-x:auto;max-width:100%}
@media(max-width:850px){body,.login{background-attachment:scroll;background-position:center top}.tabs{flex-wrap:wrap;max-height:0;overflow:hidden;transition:max-height 0.3s ease}.tabs.open{max-height:500px}.mobile-menu-btn{display:block}.content{padding:16px;margin:12px auto;width:100%}.box{width:100%}.top{padding:10px 12px}.tabs{padding:10px 8px}.g2,.g3,.g4,.g5{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}.row{justify-content:flex-start}.tab{white-space:nowrap}.modal{overflow-x:auto}.modal .box{width:min(100%,calc(100vw - 32px));max-width:100%;}}</style>
</head>
<body>
<div id="login" class="login"><div class="box"><div class="login-icon"><img src="./icon.jpeg" alt="PS Logo"></div><div class="big app-logo"><span>🎮</span><span>PlayStation Cafe Manager</span></div><p class="muted">نظام إدارة مقهى بلايستيشن هجين</p><div class="col"><label>اسم المستخدم</label><input id="lu" value="admin"><label>كلمة المرور</label><input id="lp" type="password" value="1234"><button onclick="login()">دخول</button><div id="lm" class="small" style="color:#fca5a5"></div></div></div></div>
<div id="app" class="hidden"><div class="top"><div><div class="big app-logo"><img src="./icon.jpeg" alt="PS Logo"><span>🎮 PlayStation Cafe Manager</span></div><div class="small muted">المستخدم: <span id="cu"></span> | <span id="cr"></span> | <span id="sl" class="sync">Offline</span></div></div><div class="row no-print"><button class="gray" onclick="manualSync()">مزامنة</button><button class="danger" onclick="logout()">خروج</button></div></div><button class="mobile-menu-btn no-print" onclick="toggleMobileMenu()"></button><div id="tabs" class="tabs no-print"></div><div class="content"><section id="vDashboard"></section><section id="vProducts" class="hidden"></section><section id="vDevices" class="hidden"></section><section id="vInvoices" class="hidden"></section><section id="vExpenses" class="hidden"></section><section id="vReports" class="hidden"></section><section id="vUsers" class="hidden"></section><section id="vSettings" class="hidden"></section></div><div class="version" id="versionInfo"></div></div>
<div id="modal" class="modal hidden"><div id="mc" class="box"></div></div>
<script>
const K='ps_cafe_v5_state',SK='ps_cafe_v5_settings',QK='ps_cafe_v5_sync_queue',TK='ps_cafe_v5_theme',BK='ps_cafe_v5_brightness';const DEFAULT_SUPABASE_CONFIG={url:'https://ugjjucefuhtchphfnzrn.supabase.co',key:'PASTE_FULL_SUPABASE_PUBLISHABLE_KEY_HERE',mode:'hybrid'};const APP_VERSION='V5.2 Demo - Practical Controls + PWA';let state,user=null,tab='Dashboard',dirty=false,timer=null,currentTheme='dark',currentBrightness=100;
function id(){return 'id_'+Math.random().toString(36).slice(2)+Date.now().toString(36)}
function loadTheme(){try{currentTheme=localStorage.getItem(TK)||'dark';currentBrightness=parseInt(localStorage.getItem(BK))||100;applyTheme()}catch(e){currentTheme='dark';currentBrightness=100}}
function applyTheme(){document.documentElement.classList.toggle('light-mode',currentTheme==='light');document.documentElement.style.setProperty('--brightness',currentBrightness+'%')}
function setTheme(t){if(['dark','light','auto'].includes(t)){currentTheme=t;try{localStorage.setItem(TK,t)}catch(e){}applyTheme()}}
function setBrightness(b){currentBrightness=Math.max(70,Math.min(120,parseInt(b)));try{localStorage.setItem(BK,currentBrightness)}catch(e){}applyTheme()}
function def(){return{users:[{id:id(),username:'admin',password:'1234',role:'Admin',active:true},{id:id(),username:'cashier',password:'1234',role:'Cashier',active:true}],devices:[1,2,3,4,5].map(n=>({id:'ps'+n,name:'PS '+n,status:'available',singleRate:60,multiRate:90})),products:['شاي:15:مشروبات ساخنة','قهوة:25:مشروبات ساخنة','نسكافيه:30:مشروبات ساخنة','مياه:10:مشروبات باردة','عصير:20:مشروبات باردة','كانز:25:سناكس'].map(x=>{let a=x.split(':');return{id:id(),name:a[0],price:+a[1],category:a[2]||'أخرى',trackStock:false,stockQty:0,minStock:0,active:true,soldQty:0}}),sessions:[],invoices:[],expenses:[],nextInvoice:1,shifts:[],treasury:{openingCash:0,cashSales:0,vodafoneSales:0,visaSales:0,instapSales:0,expenses:0},updatedAt:new Date().toISOString()}}
function migrateState(s){if(!s.products)s.products=def().products;s.products.forEach(p=>{if(p.category===undefined)p.category='أخرى';if(p.trackStock===undefined)p.trackStock=false;if(p.stockQty===undefined)p.stockQty=0;if(p.minStock===undefined)p.minStock=0;if(p.active===undefined)p.active=true;if(p.soldQty===undefined)p.soldQty=0});if(!s.sessions)s.sessions=[];s.sessions.forEach(x=>{if(x.timeMode===undefined)x.timeMode='open';if(x.durationMinutes===undefined)x.durationMinutes=0;if(x.expectedEndAt===undefined)x.expectedEndAt=null;if(x.endedAt===undefined)x.endedAt=null});if(!s.shifts)s.shifts=[];if(!s.treasury)s.treasury=def().treasury;return s}
function load(){try{state=JSON.parse(localStorage.getItem(K))||def();state=migrateState(state)}catch(e){state=def()}loadTheme();save(false)}function save(md=true){state.updatedAt=new Date().toISOString();try{localStorage.setItem(K,JSON.stringify(state))}catch(e){console.warn('localStorage save failed:',e.message)}if(md){dirty=true;markPending('تغيير محلي');sched()}render()}function st(){try{let s=JSON.parse(localStorage.getItem(SK))||null;if(s===null||!s.url||!s.key){if(DEFAULT_SUPABASE_CONFIG.key&&DEFAULT_SUPABASE_CONFIG.key!=='PASTE_FULL_SUPABASE_PUBLISHABLE_KEY_HERE'){return{mode:DEFAULT_SUPABASE_CONFIG.mode,url:DEFAULT_SUPABASE_CONFIG.url,key:DEFAULT_SUPABASE_CONFIG.key}}else{return{mode:'offline',url:'',key:''}}}return s}catch(e){return{mode:'offline',url:'',key:''}}}function setst(s){try{localStorage.setItem(SK,JSON.stringify(s))}catch(e){console.warn('localStorage setst failed:',e.message)}setup();render()}
function money(n){return (Number(n)||0).toFixed(2)}function fmt(d){return d?new Date(d).toLocaleString('ar-EG'):''}function today(){return new Date().toISOString().slice(0,10)}function val(x){return document.getElementById(x)?.value||''}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function isFileProtocol(){return location.protocol==='file:'}
function cleanSupabaseKey(key){return String(key||'').trim().replace(/\s+/g,'')}
function normalizeSupabaseUrl(url){let u=String(url||'').trim().replace(/\s+/g,'');u=u.replace(/\/+$/,'');u=u.replace(/\/rest\/v1$/i,'');return u}
function admin(){return user&&user.role==='Admin'}
function login(){let u=val('lu').trim().toLowerCase(),p=val('lp');let x=state.users.find(a=>a.username.toLowerCase()==u&&a.password==p&&a.active);if(!x){lm.textContent='بيانات الدخول غير صحيحة';return}user=x;document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');tab='Dashboard';tabs();loadTheme();setup();render()}function logout(){user=null;document.getElementById('app').classList.add('hidden');document.getElementById('login').classList.remove('hidden')}
function tabs(){let all=[['Dashboard','الرئيسية'],['Devices','الأجهزة والأسعار'],['Products','المشروبات'],['Invoices','الفواتير'],['Expenses','المصروفات'],['Reports','التقارير'],['Users','المستخدمين'],['Settings','الإعدادات/المزامنة']];let v=all.filter(t=>admin()||!['Devices','Expenses','Reports','Users','Settings'].includes(t[0]));document.getElementById('tabs').innerHTML=v.map(t=>`<button class="tab ${tab==t[0]?'active':''}" onclick="show('${t[0]}')">${t[1]}</button>`).join('')}
function toggleMobileMenu(){document.getElementById('tabs').classList.toggle('open')}
function show(t){tab=t;tabs();render()}function renderVersion(){document.getElementById('versionInfo').textContent='Version: '+APP_VERSION}function render(){if(!user)return;renderVersion();cu.textContent=user.username;cr.textContent=user.role;let ss=st();let q=queue().length,online=navigator.onLine;sl.textContent=ss.mode==='hybrid'?(online?(q?'Online - Pending '+q:'Online Synced'):'Offline Mode - Pending '+q):'Offline Local';sl.className='sync '+(ss.mode==='hybrid'?(online?(q?'warn':'on'):'err'):'');['Dashboard','Products','Devices','Invoices','Expenses','Reports','Users','Settings'].forEach(x=>document.getElementById('v'+x).classList.add('hidden'));document.getElementById('v'+tab).classList.remove('hidden');rDash();rProducts();rDevices();rInvoices();rExpenses();rReports();rUsers();rSettings()}
setInterval(()=>{if(user&&tab==='Dashboard')rDash()},1000)
function sess(did){return state.sessions.find(s=>s.deviceId===did&&s.status==='open')}
function cost(s){let elapsed=Date.now()-new Date(s.startedAt);let elapsedMinutes=Math.max(1,Math.ceil(elapsed/60000));let d=state.devices.find(x=>x.id===s.deviceId)||{};let rate=s.sessionType==='multi'?d.multiRate:d.singleRate;let play=elapsedMinutes/60*(+rate||0);let dr=(s.items||[]).reduce((a,i)=>a+i.price*i.qty,0);return{m:elapsedMinutes,play,dr,total:play+dr}}
function timeRemaining(s){if(s.timeMode!=='fixed'||!s.expectedEndAt)return null;let remaining=new Date(s.expectedEndAt)-Date.now();let mins=Math.ceil(remaining/60000);return Math.max(0,mins)}
function badge(d){let st=d.status,t='';let c='';if(st==='available'){c='b-ok';t='متاح'}else if(st==='busy'){c='b-busy';t='مشغول'}else if(st==='maintenance'){c='b-maintenance';t='صيانة'}else{c='b-bad';t='معطل'}return`<span class="badge ${c}">${t}</span>`}
function rDash(){let activeCount=state.sessions.filter(s=>s.status==='open').length;let avCount=state.devices.filter(d=>d.status==='available').length;vDashboard.innerHTML=`<div class="card"><div class="row" style="justify-content:space-between"><div><div class="big">لوحة التشغيل</div><div class="muted">${avCount} متاح من ${state.devices.length} | ${activeCount} جلسة نشطة</div></div><button class="ok" onclick="newSessionModal()">بدء جلسة</button></div></div><br><div class="grid g5">${state.devices.map(d=>{let s=sess(d.id);let c=s?cost(s):null;let rem=s?timeRemaining(s):null;let remStr=rem!==null?(rem<=0?'انتهى الوقت':rem+' دقيقة'):'';return`<div class="card"><div class="row" style="justify-content:space-between"><div class="big">${d.name}</div>${badge(d)}</div><div class="small muted">Single ${money(d.singleRate)} / Multi ${money(d.multiRate)}</div>${s?`<hr><div><b>${s.customerName||'--'}</b></div><div class="small">${s.sessionType==='multi'?'Multi':'Single'} | ${s.timeMode==='fixed'?'محدد':'مفتوح'}</div><div class="small muted">${fmt(s.startedAt).split(' ')[1]}</div><div class="timer ${rem!==null&&rem<=0?'expired':''}">${c.m} دقيقة${remStr?' ('+remStr+')':''}</div><div>لعب: ${money(c.play)} | مشروبات: ${money(c.dr)}</div><div class="price">الإجمالي: ${money(c.total)}</div><div class="row"><button onclick="addDrinksModal('${s.id}')">مشروبات</button>${s.timeMode==='fixed'?`<button onclick="extendSessionModal('${s.id}')">تمديد</button>`:''}<button class="danger" onclick="endSessionModal('${s.id}')">إنهاء</button></div>`:d.status==='available'?`<button class="ok" onclick="newSessionModal('${d.id}')">تشغيل</button>`:`<p class="muted">غير متاح</p>`}</div>`}).join('')}</div>`}
function newSessionModal(did=''){let av=state.devices.filter(d=>d.status==='available'&&!sess(d.id));if(av.length===0){alert('لا توجد أجهزة متاحة');return}modal(`<div class="big">بدء جلسة جديدة</div><br><div class="grid g2"><div class="col"><label>الجهاز</label><select id="sd">${av.map(d=>`<option value="${d.id}" ${d.id==did?'selected':''}>${d.name}</option>`).join('')}</select></div><div class="col"><label>نوع الجلسة</label><select id="st"><option value="single">Single</option><option value="multi">Multi</option></select></div></div><br><div class="col"><label>نمط الوقت</label><select id="tm" onchange="updateSessionTimeOptions()"><option value="fixed">مدة محددة</option><option value="open">وقت مفتوح</option></select></div><div id="timeOpts" class="grid g4"><button onclick="setDuration(15)">15 دقيقة</button><button onclick="setDuration(30)">30 دقيقة</button><button onclick="setDuration(60)">1 ساعة</button><button onclick="setDuration(120)">2 ساعة</button><button onclick="setDuration(180)">3 ساعات</button><input id="cd" type="number" placeholder="مدة مخصصة (دقيقة)" value="30" style="grid-column:1/-1"></div><div class="grid g2"><input id="sn" placeholder="اسم العميل (اختياري)"><input id="sp" type="number" placeholder="عدد اللاعبين (اختياري)"></div><input id="snt" placeholder="ملاحظات (اختياري)" style="grid-column:1/-1"><br><div class="row"><button class="ok" onclick="startSession()">بدء</button><button class="gray" onclick="closeM()">إلغاء</button></div>`)}
function updateSessionTimeOptions(){let tm=val('tm');document.getElementById('timeOpts').style.display=tm==='fixed'?'grid':'none'}
function setDuration(mins){document.getElementById('cd').value=mins}
function startSession(){let did=val('sd');let st=val('st');let tm=val('tm');let dur=tm==='fixed'?Math.max(1,+val('cd')||30):0;if(!did){alert('اختر جهاز');return}let d=state.devices.find(x=>x.id==did);if(!d){alert('الجهاز غير موجود');return}let startedAt=new Date().toISOString();let expectedEndAt=tm==='fixed'?new Date(Date.now()+dur*60000).toISOString():null;state.sessions.push({id:id(),deviceId:did,deviceName:d.name,sessionType:st,timeMode:tm,durationMinutes:dur,startedAt,expectedEndAt,endedAt:null,customerName:val('sn')||'',playersCount:val('sp')||'',notes:val('snt')||'',pricePerHour:st==='multi'?d.multiRate:d.singleRate,status:'open',items:[],playTotal:0,drinksTotal:0,grandTotal:0,user:user.username});d.status='busy';closeM();save()}
function addDrinksModal(sid){let s=state.sessions.find(x=>x.id==sid);if(!s){alert('الجلسة غير موجودة');return}let availProducts=state.products.filter(p=>p.active&&!p.trackStock||p.stockQty>0);modal(`<div class="big">إضافة مشروبات</div><div class="grid g3"><select id="dp">${availProducts.map(p=>`<option value="${p.id}">${p.name} - ${money(p.price)}${p.trackStock?' ('+p.stockQty+')':''}</option>`).join('')}</select><input id="dq" type="number" value="1" min="1"><button class="ok" onclick="addDrinkToSession('${sid}')">إضافة</button></div><br><div class="tw"><table><tr><th>الصنف</th><th>كمية</th><th>سعر</th><th>إجمالي</th><th></th></tr>${(s.items||[]).map((i,n)=>`<tr><td>${i.name}</td><td>${i.qty}</td><td>${money(i.price)}</td><td>${money(i.price*i.qty)}</td><td><button class="danger" onclick="removeDrinkFromSession('${sid}',${n})">حذف</button></td></tr>`).join('')}</table></div><br><button class="gray" onclick="closeM()">إغلاق</button>`)}
function addDrinkToSession(sid){let s=state.sessions.find(x=>x.id==sid);let p=state.products.find(x=>x.id==val('dp'));let q=Math.max(1,+val('dq')||1);if(!s){alert('الجلسة غير موجودة');return}if(!p){alert('المنتج غير موجود');return}if(p.trackStock&&p.stockQty<q){alert('المخزون غير كافي');return}s.items.push({productId:p.id,name:p.name,price:+p.price,qty:q});save();addDrinksModal(sid)}
function removeDrinkFromSession(sid,n){let s=state.sessions.find(x=>x.id==sid);if(!s||!Array.isArray(s.items)||n<0||n>=s.items.length)return;s.items.splice(n,1);save();addDrinksModal(sid)}
function endSessionModal(sid){let s=state.sessions.find(x=>x.id==sid);if(!s)return;let d=state.devices.find(x=>x.id==s.deviceId);if(!d)return;let c=cost(s);modal(`<div class="big">إنهاء الجلسة</div><hr><div><b>الجهاز:</b> ${d.name}</div><div><b>العميل:</b> ${s.customerName||'--'}</div><div><b>المدة:</b> ${c.m} دقيقة</div><div><b>نوع:</b> ${s.sessionType==='multi'?'Multi':'Single'}</div><hr><div class="big">الفاتورة:</div><div>اللعب: <b>${money(c.play)}</b></div><div>المشروبات: <b>${money(c.dr)}</b></div><div class="price">الإجمالي: ${money(c.total)}</div><hr><div class="col"><label>طريقة الدفع</label><select id="pm"><option>Cash</option><option>Vodafone Cash</option><option>Visa</option><option>Instapay</option><option>Mixed</option></select></div><div class="grid g2"><input id="disc" type="number" placeholder="خصم (إن وجد)" value="0" ${admin()?'':' disabled'}><input id="paid" type="number" placeholder="المبلغ المدفوع" value="${c.total}"></div><br><div class="row"><button class="ok" onclick="finalizeSession('${sid}')">حفظ الفاتورة</button><button class="danger" onclick="closeM()">إلغاء</button></div>`)}

function finalizeSession(sid){let s=state.sessions.find(x=>x.id==sid);if(!s)return;let d=state.devices.find(x=>x.id==s.deviceId);if(!d)return;let c=cost(s);let disc=admin()?+val('disc')||0:0;let pm=val('pm');let paid=+val('paid')||0;let inv={id:id(),no:state.nextInvoice++,date:new Date().toISOString(),deviceId:d.id,deviceName:d.name,customerName:s.customerName||'',sessionType:s.sessionType,startedAt:s.startedAt,endedAt:new Date().toISOString(),minutes:c.m,playTotal:+c.play.toFixed(2),drinksTotal:+c.dr.toFixed(2),discount:+disc.toFixed(2),subtotal:+(c.total-disc).toFixed(2),total:+(c.total-disc).toFixed(2),items:s.items,paymentMethod:pm,paidAmount:+paid.toFixed(2),remaining:+(paid-(c.total-disc)).toFixed(2),user:user.username};s.status='closed';s.endedAt=inv.endedAt;d.status='available';state.invoices.push(inv);(s.items||[]).forEach(item=>{let prod=state.products.find(p=>p.id==item.productId);if(prod&&prod.trackStock){prod.stockQty=Math.max(0,prod.stockQty-item.qty);prod.soldQty=(prod.soldQty||0)+item.qty}});state.shifts[state.shifts.length-1]&&(state.shifts[state.shifts.length-1].totalSales+=inv.total);closeM();save();showInvoice(inv.id)}

function rSettings(){let s=st();let fileProto=isFileProtocol();let hasValidKey=s.key&&s.key!=='PASTE_FULL_SUPABASE_PUBLISHABLE_KEY_HERE'&&s.key.length>20;let q=queue();vSettings.innerHTML=`<div class="card"><div class="big">الإضاءة / المظهر</div><div class="grid g2"><label>المظهر</label><select id="theme" onchange="setTheme(val('theme'))" ><option value="dark" ${currentTheme==='dark'?'selected':''}>داكن</option><option value="light" ${currentTheme==='light'?'selected':''}>فاتح</option></select></div><div class="col"><label>سطوع الشاشة: <b id="brightValue">${currentBrightness}%</b></label><input type="range" min="70" max="120" value="${currentBrightness}" class="brightness-slider" oninput="setBrightness(this.value);document.getElementById('brightValue').textContent=this.value+'%'"></div></div><br><div class="card"><div class="big">المزامنة مع Supabase</div><p class="muted">نمط هجين: عندما يكون النت مقطوع، يحفظ البرنامج العمليات Offline، وعند رجوع النت يعمل Auto Sync.</p><div class="kpi">حالة النت: <b>${navigator.onLine?'متصل':'غير متصل'}</b> | عمليات منتظرة: <b>${q.length}</b></div><br><div class="grid g2"><select id="mode"><option value="offline" ${s.mode==='offline'?'selected':''}>Offline فقط</option><option value="hybrid" ${s.mode==='hybrid'?'selected':''}>Hybrid Supabase</option></select><input id="url" value="${esc(normalizeSupabaseUrl(s.url))}" placeholder="https://projectid.supabase.co"><textarea id="key" rows="3" placeholder="اسم المفتاح ينتهي بـ ..." spellcheck="false">${esc(s.key)}</textarea></div><div class="row"><button class="ok" onclick="saveSettings()">حفظ</button><button class="ok" onclick="manualSync()">مزامنة الآن</button><button onclick="showQueue()">عرض الانتظار</button></div><br><div class="row"><button class="ok" onclick="resetSupabaseDefaults()">استعادة إعدادات Supabase الافتراضية</button><button class="danger" onclick="clearSupabaseSettings()">مسح إعدادات Supabase</button><button class="danger" onclick="exportBackup()">تصدير Backup</button></div><input type="file" onchange="importBackup(event)" accept=".json" style="margin-top:10px"><div class="row" style="margin-top:10px"><button class="danger" onclick="clearQueue()">مسح الانتظار</button><button class="danger" onclick="resetAll()">تصفير الكل</button></div></div>`}
function saveSettings(){let url=normalizeSupabaseUrl(val('url'));let key=cleanSupabaseKey(val('key'));if(!url){alert('أدخل Supabase URL');return}if(key.includes('...')){alert('مفتاح API غير كامل. انسخه باستخدام زر النسخ من Supabase.');return}if(url.includes('/rest/v1')){url=normalizeSupabaseUrl(url)}setst({mode:val('mode'),url,key});alert('تم الحفظ')}
function resetSupabaseDefaults(){if(confirm('استعادة إعدادات Supabase الافتراضية؟')){setst({mode:DEFAULT_SUPABASE_CONFIG.mode,url:DEFAULT_SUPABASE_CONFIG.url,key:DEFAULT_SUPABASE_CONFIG.key});alert('تم الاستعادة')}}
function clearSupabaseSettings(){if(confirm('مسح إعدادات Supabase فقط (البيانات المحلية آمنة)؟')){setst({mode:'offline',url:'',key:''});alert('تم المسح')}}function exportBackup(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='ps_backup_'+today()+'.json';a.click()}function isValidStateSchema(obj){if(!obj||typeof obj!=='object')return false;const req={users:'array',devices:'array',products:'array',sessions:'array',invoices:'array',expenses:'array',nextInvoice:'number',updatedAt:'string'};for(let k in req){if(!(k in obj))return false;if(req[k]==='array'&&!Array.isArray(obj[k]))return false;if(req[k]==='number'&&typeof obj[k]!=='number')return false;if(req[k]==='string'&&typeof obj[k]!=='string')return false}return true}function importBackup(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let imported=JSON.parse(r.result);if(!isValidStateSchema(imported)){alert('ملف النسخة الاحتياطية غير صحيح');return}state=imported;state=migrateState(state);save();alert('تم استيراد النسخة الاحتياطية')}catch(err){alert('خطأ في قراءة الملف: '+err.message)}};r.readAsText(f)}function resetAll(){if(confirm('حذف كل البيانات؟')){state=def();save()}}

function queue(){try{return JSON.parse(localStorage.getItem(QK))||[]}catch(e){return[]}}

async function req(m,path,body){let s=st();if(!navigator.onLine)throw Error('لا يوجد اتصال بالإنترنت');if(!s.url||!s.key)throw Error('بيانات Supabase غير مكتملة');let url_normalized=normalizeSupabaseUrl(s.url);let key_clean=cleanSupabaseKey(s.key);let headers={'apikey':key_clean,'Content-Type':'application/json'};if(m==='POST'){headers['Prefer']='resolution=merge-duplicates,return=representation'}let fullUrl=url_normalized+'/rest/v1/'+path;let r=await fetch(fullUrl,{method:m,headers,body:body?JSON.stringify(body):undefined});if(!r.ok){let errorText=await r.text();if(r.status===401){throw Error('Invalid API key. Make sure the full publishable key was copied from Supabase. The key should start with sb_publishable_ and be sent only as apikey header, not as Bearer token.')}throw Error(errorText||'API Error: '+r.status)}return await r.json()}
async function loadCloud(){try{let rows=await req('GET','ps_cafe_state?id=eq.main&select=*');if(rows&&rows[0]&&!dirty&&queue().length===0){state=rows[0].data;state=migrateState(state);try{localStorage.setItem(K,JSON.stringify(state))}catch(e){console.warn('localStorage loadCloud failed:',e.message)}render();return true}return!!(rows&&rows[0])}catch(e){console.warn('loadCloud error:',e.message);return false}}
async function saveCloud(){try{await req('POST','ps_cafe_state',[{id:'main',data:state,updated_at:new Date().toISOString()}]);dirty=false;setQueue([]);render();return true}catch(e){throw e}}
async function flushQueue(){if(st().mode!=='hybrid')return false;if(!navigator.onLine)throw Error('النت غير متصل. تم حفظ العملية Offline وستتم المزامنة تلقائيا.');let q=queue();if(q.length){state=q[q.length-1].state;state=migrateState(state);try{localStorage.setItem(K,JSON.stringify(state))}catch(e){console.warn('localStorage flushQueue failed:',e.message)}}await saveCloud();return true}
async function manualSync(){if(isFileProtocol()){alert('المزامنة غير متاحة من ملف محلي. استخدم خادم HTTP أو اختر Offline فقط.');return}if(st().mode!=='hybrid')return alert('فعل Hybrid Supabase من الإعدادات أولا');try{await flushQueue();await loadCloud();alert('تمت المزامنة بنجاح')}catch(e){render();alert('خطأ في المزامنة: '+e.message)}}
function sched(){if(st().mode==='hybrid'){clearTimeout(window.sd);window.sd=setTimeout(()=>flushQueue().catch(e=>{console.warn(e.message);render()}),1200)}}
function setup(){clearInterval(timer);window.removeEventListener('online',window.__psOnline||(()=>{}));window.__psOnline=()=>{if(st().mode==='hybrid')flushQueue().catch(console.warn)};window.addEventListener('online',window.__psOnline);if(st().mode==='hybrid'){timer=setInterval(()=>{if(dirty||queue().length)flushQueue().catch(e=>{console.warn(e.message);render()});else loadCloud().catch(console.warn)},15000)}}
load();setup();
</script><script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker
        .register("./service-worker.js")
        .then(function (registration) {
          console.log("Service Worker registered:", registration.scope);
        })
        .catch(function (error) {
          console.warn("Service Worker registration failed:", error);
        });
    });
  }
</script></body></html>
