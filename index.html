<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="PS Manager" />
  <link rel="manifest" href="manifest.json" />
  <title>PlayStation Cafe Manager V5.2</title>
  <style>
    :root{
      --bg:#020617;--panel:#0f172a;--panel2:#111827;--card:#111827f2;--border:#334155;--text:#f8fafc;--muted:#94a3b8;
      --blue:#2563eb;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--shadow:0 18px 50px #0008;--brightness:100%;
    }
    :root.light{--bg:#f8fafc;--panel:#ffffff;--panel2:#f1f5f9;--card:#ffffff;--border:#cbd5e1;--text:#0f172a;--muted:#475569;--shadow:0 12px 25px #0002;}
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(180deg,#020617,#061225);color:var(--text);overflow-x:hidden;filter:brightness(var(--brightness));}
    .light body{background:#f8fafc} body{background-color:var(--bg)}
    button,input,select,textarea{font-family:inherit;font-size:15px;border-radius:12px;border:1px solid var(--border);padding:10px;background:var(--panel2);color:var(--text);max-width:100%;}
    input,select,textarea{width:100%;outline:none} button{cursor:pointer;border:none;background:var(--blue);color:white;font-weight:700;transition:.18s transform,.18s opacity;min-height:42px} button:active{transform:scale(.98)} button:hover{opacity:.92}
    .btn-green{background:var(--green);color:#052e16}.btn-red{background:var(--red)}.btn-gray{background:#475569}.btn-yellow{background:var(--yellow);color:#3b2100}.btn-small{min-height:34px;padding:7px 10px;font-size:13px;border-radius:10px}.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
    .hidden{display:none!important}.muted{color:var(--muted)}.small{font-size:13px}.big{font-size:22px;font-weight:800}.ltr{direction:ltr;text-align:left;unicode-bidi:plaintext;font-family:Consolas,monospace}.nowrap{white-space:nowrap}.center{text-align:center}
    .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(180deg,#020617d9,#020617ef),url('./wallpaper.jpeg');background-size:cover;background-position:center top}
    .login-card{width:min(420px,100%);background:#0f172af5;border:1px solid #ffffff1c;border-radius:22px;padding:22px;box-shadow:var(--shadow)}
    .logo{display:flex;gap:10px;align-items:center}.logo img{width:44px;height:44px;border-radius:14px;object-fit:cover;border:1px solid #ffffff33}.login-logo{display:flex;justify-content:center;margin-bottom:10px}.login-logo img{width:76px;height:76px;border-radius:22px;object-fit:cover;border:2px solid #ffffff33}
    .top{position:sticky;top:0;z-index:20;background:#020617f5;border-bottom:1px solid #334155;padding:10px 14px;backdrop-filter:blur(8px)}
    .top-main{max-width:1320px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:10px}.top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.status{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;font-size:12px;border:1px solid #64748b55;background:#64748b20;color:#cbd5e1}.status.ok{background:#22c55e22;color:#dcfce7;border-color:#22c55e55}.status.warn{background:#f59e0b22;color:#fef3c7;border-color:#f59e0b55}.status.bad{background:#ef444422;color:#fee2e2;border-color:#ef444455}
    .tabs{background:#0b1224;border-bottom:1px solid #334155;display:flex;gap:6px;overflow-x:auto;padding:10px 14px}.tab-btn{background:#111827;color:#cbd5e1;border:1px solid #334155;white-space:nowrap}.tab-btn.active{background:var(--blue);color:white}.mobile-menu-btn{display:none;background:var(--blue);min-width:46px;font-size:20px}
    .wrap{max-width:1320px;margin:14px auto;padding:0 14px}.content-card,.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;box-shadow:var(--shadow)}
    .grid{display:grid;gap:12px}.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-5{grid-template-columns:repeat(5,minmax(0,1fr))}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.col{display:flex;flex-direction:column;gap:8px}.space{justify-content:space-between}.section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    .device-card{min-height:150px;display:flex;flex-direction:column;gap:8px}.device-head{display:flex;justify-content:space-between;gap:8px;align-items:center}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-size:12px;border:1px solid #64748b55;background:#64748b22}.badge.free{background:#22c55e22;color:#dcfce7;border-color:#22c55e55}.badge.busy{background:#f59e0b22;color:#fef3c7;border-color:#f59e0b55}.badge.maint{background:#ef444422;color:#fee2e2;border-color:#ef444455}.price{font-size:13px;color:var(--muted)}
    .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:16px}table{width:100%;border-collapse:collapse;min-width:720px}th,td{padding:10px;border-bottom:1px solid var(--border);text-align:right}th{background:#0b1224;color:#cbd5e1}.light th{background:#e2e8f0;color:#0f172a}tr:last-child td{border-bottom:0}
    .modal-backdrop{position:fixed;inset:0;background:#0009;display:none;align-items:center;justify-content:center;z-index:60;padding:16px}.modal-backdrop.open{display:flex}.modal{width:min(720px,100%);max-height:92vh;overflow:auto;background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:18px;box-shadow:var(--shadow)}
    .drawer-backdrop{position:fixed;inset:0;background:#0009;display:none;z-index:50}.drawer-backdrop.open{display:block}.drawer{position:fixed;top:0;right:0;bottom:0;width:min(420px,100%);background:#020617fa;padding:18px;display:flex;flex-direction:column;gap:10px;overflow:auto;box-shadow:-10px 0 35px #0008}.drawer .tab-btn{width:100%;min-height:52px;text-align:right}.drawer .tab-btn.active{background:var(--blue)}
    .toast{position:fixed;left:16px;right:16px;bottom:16px;z-index:80;display:none;padding:14px;border-radius:16px;border:1px solid #64748b55;background:#0f172af7;box-shadow:var(--shadow);color:white}.toast.show{display:block}.toast.ok{border-color:#22c55e77}.toast.warn{border-color:#f59e0b88}.toast.bad{border-color:#ef444488}
    .settings-line{display:grid;grid-template-columns:220px 1fr;gap:12px;align-items:start;margin:10px 0}.kpi{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.kpi .card{box-shadow:none}.footer{padding:16px;text-align:center;color:var(--muted);font-size:12px}.empty{padding:24px;text-align:center;color:var(--muted);border:1px dashed var(--border);border-radius:16px}
    @media(max-width:900px){.grid-5{grid-template-columns:repeat(2,minmax(0,1fr))}.grid-3{grid-template-columns:repeat(2,minmax(0,1fr))}.kpi{grid-template-columns:repeat(2,minmax(0,1fr))}.tabs{display:none}.mobile-menu-btn{display:inline-flex;align-items:center;justify-content:center}.top-main{flex-direction:column;align-items:stretch}.top-actions{justify-content:space-between}.top-actions button{flex:1;min-width:0}.logo .title{font-size:17px}.wrap{margin-top:10px;padding:0 10px}.content-card,.card{border-radius:16px;padding:12px}.device-card{min-height:128px}.settings-line{grid-template-columns:1fr}.modal{padding:14px}.login-card{padding:18px}}
    @media(max-width:330px){.grid-5,.grid-3,.grid-2,.kpi{grid-template-columns:1fr}.top-actions button{font-size:13px;padding:8px}}
    @media print{.no-print,.top,.tabs,.drawer-backdrop{display:none!important}body{background:white;color:black}.wrap{max-width:none}.content-card,.card{box-shadow:none;border:1px solid #ddd;color:black;background:white}}
  </style>
</head>
<body>
  <div id="loginPage" class="login">
    <div class="login-card">
      <div class="login-logo"><img src="./icon.jpeg" onerror="this.src='./icon-512.png'" alt="logo"></div>
      <div class="center big">🎮 PlayStation Cafe Manager</div>
      <p class="center muted">نسخة V5.2 مستقرة للتجربة والتشغيل المحلي</p>
      <div class="col">
        <label>اسم المستخدم</label><input id="loginUser" value="admin" />
        <label>كلمة المرور</label><input id="loginPass" value="1234" type="password" />
        <button data-action="login">دخول</button>
        <div id="loginMsg" class="small" style="color:#fca5a5"></div>
      </div>
    </div>
  </div>
  <div id="appPage" class="hidden">
    <div class="top no-print">
      <div class="top-main">
        <div class="logo"><img src="./icon.jpeg" onerror="this.src='./icon-512.png'" alt="logo"><div><div class="title"><b>PlayStation Cafe Manager</b></div><div class="small muted">V5.2 Stable Demo</div></div></div>
        <div class="row small"><span>المستخدم: <b id="currentUserName"></b></span><span id="currentUserRole" class="muted"></span><span id="syncStatus" class="status">Offline Local</span></div>
        <div class="top-actions">
          <button class="btn-gray" data-action="sync-now">مزامنة</button>
          <button class="btn-red" data-action="logout">خروج</button>
          <button class="mobile-menu-btn" data-action="open-drawer">☰</button>
        </div>
      </div>
    </div>
    <div id="tabs" class="tabs no-print"></div>
    <div id="drawerBackdrop" class="drawer-backdrop no-print" data-action="close-drawer"><div id="drawer" class="drawer" data-no-close="1"></div></div>
    <main class="wrap"><div id="view" class="content-card"></div></main>
    <div class="footer">V5.2 Stable Demo - Practical Controls + PWA</div>
  </div>
  <div id="modalBackdrop" class="modal-backdrop"><div id="modal" class="modal"></div></div>
  <div id="toast" class="toast"></div>
<script>
(() => {
'use strict';
const STORE_KEY='ps_cafe_v5_state';
const SETTINGS_KEY='ps_cafe_v5_settings';
const QUEUE_KEY='ps_cafe_v5_sync_queue';
const THEME_KEY='ps_cafe_v5_theme';
const VERSION='V5.2 Stable Demo';
const DEFAULT_SUPABASE_CONFIG={url:'https://bzzkgrdxrjeeypqzbjhz.supabase.co',key:'',mode:'offline'};
const TABS=[['dashboard','الرئيسية'],['devices','الأجهزة والأسعار'],['products','المشروبات'],['invoices','الفواتير'],['expenses','المصروفات'],['reports','التقارير'],['users','المستخدمين'],['settings','الإعدادات/المزامنة']];
let currentUser=null;let currentTab='dashboard';let state=loadState();let tickTimer=null;
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function nowISO(){return new Date().toISOString()} function today(){return new Date().toISOString().slice(0,10)}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function money(n){return Number(n||0).toFixed(2)} function minutesBetween(a,b){return Math.max(0,Math.ceil((new Date(b)-new Date(a))/60000))}
function fmt(dt){try{return new Date(dt).toLocaleString('ar-EG')}catch(e){return dt||''}} function shortTime(dt){try{return new Date(dt).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}catch(e){return''}}
function cleanSupabaseKey(k){return String(k||'').trim().replace(/\s+/g,'')} function normalizeSupabaseUrl(url){let u=String(url||'').trim();u=u.replace(/\s+/g,'');u=u.replace(/\/rest\/v1\/?$/i,'');u=u.replace(/\/+$/,'');return u}
function defaults(){return {updatedAt:nowISO(),nextInvoice:1,users:[{id:'u_admin',username:'admin',password:'1234',name:'Admin',role:'admin',active:true},{id:'u_cashier',username:'cashier',password:'1234',name:'Cashier',role:'cashier',active:true}],devices:[1,2,3,4,5].map(i=>({id:'ps'+i,name:'PS '+i,singlePrice:60,multiPrice:90,status:'available',active:true})),products:[{id:'p1',name:'شاي',category:'مشروبات ساخنة',price:10,stockQty:50,minStock:5,trackStock:false,active:true,soldQty:0},{id:'p2',name:'قهوة',category:'مشروبات ساخنة',price:20,stockQty:50,minStock:5,trackStock:false,active:true,soldQty:0},{id:'p3',name:'نسكافيه',category:'مشروبات ساخنة',price:25,stockQty:30,minStock:5,trackStock:false,active:true,soldQty:0},{id:'p4',name:'مياه',category:'مشروبات باردة',price:10,stockQty:50,minStock:10,trackStock:false,active:true,soldQty:0},{id:'p5',name:'عصير',category:'مشروبات باردة',price:25,stockQty:20,minStock:5,trackStock:false,active:true,soldQty:0},{id:'p6',name:'كانز',category:'مشروبات باردة',price:30,stockQty:30,minStock:5,trackStock:false,active:true,soldQty:0}],activeSessions:{},invoices:[],expenses:[],settings:{theme:'dark',brightness:100}}}
function migrate(s){const d=defaults();s=s&&typeof s==='object'?s:{};s.users=Array.isArray(s.users)&&s.users.length?s.users:d.users;s.devices=Array.isArray(s.devices)&&s.devices.length?s.devices:d.devices;s.products=Array.isArray(s.products)&&s.products.length?s.products:d.products;s.invoices=Array.isArray(s.invoices)?s.invoices:[];s.expenses=Array.isArray(s.expenses)?s.expenses:[];s.activeSessions=s.activeSessions&&typeof s.activeSessions==='object'?s.activeSessions:{};s.settings=s.settings||{};s.nextInvoice=Number(s.nextInvoice||1);s.updatedAt=s.updatedAt||nowISO();s.users.forEach(u=>{u.active=u.active!==false;u.role=u.role||'cashier';u.name=u.name||u.username});s.devices.forEach((x,i)=>{x.id=x.id||('ps'+(i+1));x.name=x.name||('PS '+(i+1));x.singlePrice=Number(x.singlePrice||x.single||60);x.multiPrice=Number(x.multiPrice||x.multi||90);x.status=x.status||'available';x.active=x.active!==false});s.products.forEach(p=>{p.id=p.id||uid();p.category=p.category||'أخرى';p.price=Number(p.price||0);p.stockQty=Number(p.stockQty||0);p.minStock=Number(p.minStock||0);p.trackStock=!!p.trackStock;p.active=p.active!==false;p.soldQty=Number(p.soldQty||0)});return s}
function loadState(){try{return migrate(JSON.parse(localStorage.getItem(STORE_KEY)||'{}'))}catch(e){return defaults()}} function saveState(){state.updatedAt=nowISO();localStorage.setItem(STORE_KEY,JSON.stringify(state))}
function getSettings(){try{return {...DEFAULT_SUPABASE_CONFIG,...JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')}}catch(e){return {...DEFAULT_SUPABASE_CONFIG}}}
function saveSettingsObj(s){s.url=normalizeSupabaseUrl(s.url);s.key=cleanSupabaseKey(s.key);localStorage.setItem(SETTINGS_KEY,JSON.stringify(s))}
function toast(msg,type='ok'){const el=document.getElementById('toast');el.className='toast show '+type;el.textContent=msg;clearTimeout(window.__toast);window.__toast=setTimeout(()=>el.classList.remove('show'),3500)}
function setStatus(label,type='gray'){const el=document.getElementById('syncStatus');el.textContent=label;el.className='status '+(type==='ok'?'ok':type==='bad'?'bad':type==='warn'?'warn':'')}
function openModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('modalBackdrop').classList.add('open')} function closeModal(){document.getElementById('modalBackdrop').classList.remove('open');document.getElementById('modal').innerHTML=''}
function openDrawer(){renderDrawer();document.getElementById('drawerBackdrop').classList.add('open')} function closeDrawer(){document.getElementById('drawerBackdrop').classList.remove('open')}
function showTab(tab){currentTab=tab;closeDrawer();render()}
function render(){if(!currentUser)return;renderTabs();document.getElementById('currentUserName').textContent=currentUser.name||currentUser.username;document.getElementById('currentUserRole').textContent=currentUser.role==='admin'?'Admin':'Cashier';document.documentElement.classList.toggle('light',state.settings.theme==='light');document.documentElement.style.setProperty('--brightness',(state.settings.brightness||100)+'%');const view=document.getElementById('view');const map={dashboard:renderDashboard,devices:renderDevices,products:renderProducts,invoices:renderInvoices,expenses:renderExpenses,reports:renderReports,users:renderUsers,settings:renderSettings};view.innerHTML=(map[currentTab]||renderDashboard)()}
function renderTabs(){const html=TABS.map(([id,label])=>`<button class="tab-btn ${currentTab===id?'active':''}" data-action="show-tab" data-tab="${id}">${label}</button>`).join('');document.getElementById('tabs').innerHTML=html}
function renderDrawer(){document.getElementById('drawer').innerHTML=`<button class="btn-gray" data-action="close-drawer">إغلاق ×</button>`+TABS.map(([id,label])=>`<button class="tab-btn ${currentTab===id?'active':''}" data-action="show-tab" data-tab="${id}">${label}</button>`).join('')}
function dashboardTotals(){let todayInv=state.invoices.filter(i=>(i.createdAt||'').slice(0,10)===today());let total=todayInv.reduce((a,b)=>a+Number(b.total||0),0);let drinks=todayInv.reduce((a,b)=>a+Number(b.drinksTotal||0),0);let play=todayInv.reduce((a,b)=>a+Number(b.playTotal||0),0);return {count:todayInv.length,total,drinks,play}}
function renderDashboard(){const t=dashboardTotals();return `<div class="section-title"><div><div class="big">لوحة التشغيل</div><div class="muted small">إدارة الجلسات والأجهزة</div></div><button data-action="open-start">بدء جلسة</button></div><div class="kpi"><div class="card"><div class="muted">جلسات اليوم</div><div class="big">${t.count}</div></div><div class="card"><div class="muted">إيراد اللعب</div><div class="big">${money(t.play)}</div></div><div class="card"><div class="muted">إيراد المشروبات</div><div class="big">${money(t.drinks)}</div></div><div class="card"><div class="muted">الإجمالي</div><div class="big">${money(t.total)}</div></div></div><br><div class="grid grid-5">${state.devices.filter(d=>d.active!==false).map(renderDeviceCard).join('')}</div>`}
function renderDeviceCard(d){const s=state.activeSessions[d.id];let cls=s?'busy':d.status==='maintenance'?'maint':'free';let badge=s?'مشغول':d.status==='maintenance'?'صيانة':'متاح';let body='';if(s){const mins=s.timeMode==='fixed'?Number(s.durationMinutes||0):minutesBetween(s.startedAt,new Date());const elapsed=minutesBetween(s.startedAt,new Date());const rem=s.timeMode==='fixed'?Math.max(0,mins-elapsed):null;const play=sessionPlayTotal(s);body=`<div class="small">${s.sessionType==='multi'?'Multi':'Single'} | ${s.timeMode==='fixed'?'محدد':'مفتوح'}</div><div class="small">${s.timeMode==='fixed'?'متبقي: '+rem+' د':'المدة: '+elapsed+' د'}</div><div class="price">اللعب: ${money(play)} | مشروبات: ${money(sessionDrinksTotal(s))}</div><div class="row"><button class="btn-small" data-action="add-drink" data-device="${d.id}">مشروبات</button><button class="btn-small btn-yellow" data-action="extend-session" data-device="${d.id}">تمديد</button><button class="btn-small btn-red" data-action="end-session" data-device="${d.id}">إنهاء</button></div>`}else{body=`<div class="price">Single: ${money(d.singlePrice)} / ساعة</div><div class="price">Multi: ${money(d.multiPrice)} / ساعة</div><button class="btn-green" data-action="open-start" data-device="${d.id}">تشغيل</button>`}return `<div class="card device-card"><div class="device-head"><b>${esc(d.name)}</b><span class="badge ${cls}">${badge}</span></div>${body}</div>`}
function sessionDrinksTotal(s){return (s.items||[]).reduce((a,b)=>a+Number(b.total||0),0)} function sessionPlayTotal(s){const mins=s.timeMode==='fixed'?Number(s.durationMinutes||0):minutesBetween(s.startedAt,new Date());return Math.max(0,(mins/60)*Number(s.pricePerHour||0))}
function renderProducts(){return `<div class="section-title"><div><div class="big">المشروبات والمنتجات</div><div class="muted small">إضافة وتعديل ومخزون</div></div><button data-action="open-product">إضافة مشروب</button></div><div class="table-wrap"><table><thead><tr><th>الاسم</th><th>الفئة</th><th>السعر</th><th>المخزون</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody>${state.products.map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(p.category)}</td><td>${money(p.price)}</td><td>${p.trackStock?`${p.stockQty} / حد ${p.minStock}`:'غير مفعل'}</td><td>${p.active?'فعال':'موقوف'}</td><td><button class="btn-small" data-action="edit-product" data-id="${p.id}">تعديل</button> <button class="btn-small ${p.active?'btn-red':'btn-green'}" data-action="toggle-product" data-id="${p.id}">${p.active?'إيقاف':'تفعيل'}</button></td></tr>`).join('')}</tbody></table></div>`}
function renderDevices(){return `<div class="section-title"><div><div class="big">الأجهزة والأسعار</div><div class="muted small">تعديل الأسعار والحالة</div></div><button data-action="open-device">إضافة جهاز</button></div><div class="grid grid-3">${state.devices.map(d=>`<div class="card"><div class="device-head"><b>${esc(d.name)}</b><span class="badge ${d.active?'free':'maint'}">${d.active?'فعال':'موقوف'}</span></div><div class="price">Single: ${money(d.singlePrice)}</div><div class="price">Multi: ${money(d.multiPrice)}</div><div class="price">الحالة: ${d.status}</div><br><button data-action="edit-device" data-id="${d.id}">تعديل</button></div>`).join('')}</div>`}
function renderExpenses(){return `<div class="section-title"><div><div class="big">المصروفات</div><div class="muted small">تسجيل مصروفات المحل</div></div><button data-action="open-expense">إضافة مصروف</button></div>${state.expenses.length?`<div class="table-wrap"><table><thead><tr><th>التاريخ</th><th>النوع</th><th>البيان</th><th>المبلغ</th><th>إجراء</th></tr></thead><tbody>${state.expenses.map(e=>`<tr><td>${esc(e.date)}</td><td>${esc(e.category)}</td><td>${esc(e.note)}</td><td>${money(e.amount)}</td><td><button class="btn-small" data-action="edit-expense" data-id="${e.id}">تعديل</button></td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">لا توجد مصروفات بعد.</div>'}`}

function renderReports(){const inv=state.invoices;const exp=state.expenses;const total=inv.reduce((a,b)=>a+Number(b.total||0),0);const play=inv.reduce((a,b)=>a+Number(b.playTotal||0),0);const drinks=inv.reduce((a,b)=>a+Number(b.drinksTotal||0),0);const expenses=exp.reduce((a,b)=>a+Number(b.amount||0),0);return `<div class="section-title"><div><div class="big">التقارير</div><div class="muted small">ملخص سريع للديمو</div></div></div><div class="kpi"><div class="card"><div class="muted">الفواتير</div><div class="big">${inv.length}</div></div><div class="card"><div class="muted">اللعب</div><div class="big">${money(play)}</div></div><div class="card"><div class="muted">المشروبات</div><div class="big">${money(drinks)}</div></div><div class="card"><div class="muted">الصافي</div><div class="big">${money(total-expenses)}</div></div></div>`}
function renderSettings(){const s=getSettings();let last=s.lastSync?fmt(s.lastSync):'لا يوجد';return `<div class="section-title"><div><div class="big">الإعدادات والمزامنة</div><div class="muted small">الحالة: <span>${s.status||'Offline Local'}</span> | آخر مزامنة: ${last}</div></div></div><div class="card"><h3>المظهر</h3><div class="settings-line"><label>الوضع</label><select id="themeMode"><option value="dark" ${state.settings.theme!=='light'?'selected':''}>داكن</option><option value="light" ${state.settings.theme==='light'?'selected':''}>فاتح</option></select></div><div class="settings-line"><label>السطوع</label><input id="brightness" type="range" min="70" max="120" value="${state.settings.brightness||100}"></div><button data-action="save-theme">حفظ المظهر</button></div><br><div class="card"><h3>Supabase</h3><div class="settings-line"><label>وضع المزامنة</label><select id="syncMode"><option value="offline" ${s.mode!=='hybrid'?'selected':''}>Offline Local</option><option value="hybrid" ${s.mode==='hybrid'?'selected':''}>Hybrid Supabase</option></select></div><div class="settings-line"><label>Project URL</label><div><input class="ltr" id="supabaseUrl" placeholder="https://bzzkgrdxrjeeypqzbjhz.supabase.co" value="${esc(normalizeSupabaseUrl(s.url||''))}"><div class="small muted">أدخل Project URL فقط بدون /rest/v1</div></div></div><div class="settings-line"><label>API Key</label><textarea class="ltr" id="supabaseKey" rows="3" placeholder="sb_publishable_...">${esc(s.key||'')}</textarea></div><div class="row"><button data-action="save-sync-settings">حفظ</button><button class="btn-green" data-action="sync-now">مزامنة الآن</button><button class="btn-gray" data-action="restore-sync-defaults">استعادة الافتراضي</button><button class="btn-red" data-action="clear-sync-settings">مسح الإعدادات</button></div><br><div class="small muted">الحالة: ${esc(s.status||'Offline Local')} | آخر مزامنة: ${last} | عمليات منتظرة: ${getQueue().length}</div></div>`}
function productModal(id){const p=id?state.products.find(x=>x.id===id):{name:'',category:'مشروبات ساخنة',price:0,stockQty:0,minStock:0,trackStock:false,active:true};openModal(`<div class="section-title"><div class="big">${id?'تعديل مشروب':'إضافة مشروب'}</div><button class="btn-gray" data-action="close-modal">إغلاق</button></div><div class="grid grid-2"><div class="col"><label>الاسم</label><input id="prodName" value="${esc(p.name)}"></div><div class="col"><label>الفئة</label><select id="prodCategory"><option ${p.category==='مشروبات ساخنة'?'selected':''}>مشروبات ساخنة</option><option ${p.category==='مشروبات باردة'?'selected':''}>مشروبات باردة</option><option ${p.category==='سناكس'?'selected':''}>سناكس</option><option ${p.category==='أخرى'?'selected':''}>أخرى</option></select></div><div class="col"><label>السعر</label><input id="prodPrice" type="number" value="${p.price}"></div><div class="col"><label>المخزون</label><input id="prodStock" type="number" value="${p.stockQty||0}"></div><div class="col"><label>حد التنبيه</label><input id="prodMin" type="number" value="${p.minStock||0}"></div><label class="row"><input id="prodTrack" type="checkbox" ${p.trackStock?'checked':''} style="width:auto"> تتبع المخزون</label></div><br><button data-action="save-product" data-id="${id||''}">حفظ</button>`)}
function deviceModal(id){const d=id?state.devices.find(x=>x.id===id):{name:'',singlePrice:60,multiPrice:90,status:'available',active:true};openModal(`<div class="section-title"><div class="big">${id?'تعديل جهاز':'إضافة جهاز'}</div><button class="btn-gray" data-action="close-modal">إغلاق</button></div><div class="grid grid-2"><div class="col"><label>الاسم</label><input id="devName" value="${esc(d.name)}"></div><div class="col"><label>Single</label><input id="devSingle" type="number" value="${d.singlePrice}"></div><div class="col"><label>Multi</label><input id="devMulti" type="number" value="${d.multiPrice}"></div><div class="col"><label>الحالة</label><select id="devStatus"><option value="available" ${d.status==='available'?'selected':''}>متاح</option><option value="maintenance" ${d.status==='maintenance'?'selected':''}>صيانة</option><option value="disabled" ${d.status==='disabled'?'selected':''}>غير مفعل</option></select></div><label class="row"><input id="devActive" type="checkbox" ${d.active!==false?'checked':''} style="width:auto"> فعال</label></div><br><button data-action="save-device" data-id="${id||''}">حفظ</button>`)}
function expenseModal(id){const e=id?state.expenses.find(x=>x.id===id):{date:today(),category:'عام',note:'',amount:0};openModal(`<div class="section-title"><div class="big">${id?'تعديل مصروف':'إضافة مصروف'}</div><button class="btn-gray" data-action="close-modal">إغلاق</button></div><div class="grid grid-2"><div class="col"><label>التاريخ</label><input id="expDate" type="date" value="${esc(e.date)}"></div><div class="col"><label>النوع</label><input id="expCat" value="${esc(e.category)}"></div><div class="col"><label>المبلغ</label><input id="expAmount" type="number" value="${e.amount}"></div><div class="col"><label>البيان</label><input id="expNote" value="${esc(e.note)}"></div></div><br><button data-action="save-expense" data-id="${id||''}">حفظ</button>`)}
function userModal(id){const u=id?state.users.find(x=>x.id===id):{name:'',username:'',password:'1234',role:'cashier',active:true};openModal(`<div class="section-title"><div class="big">${id?'تعديل مستخدم':'إضافة مستخدم'}</div><button class="btn-gray" data-action="close-modal">إغلاق</button></div><div class="grid grid-2"><div class="col"><label>الاسم</label><input id="userName" value="${esc(u.name)}"></div><div class="col"><label>Username</label><input id="userUsername" value="${esc(u.username)}"></div><div class="col"><label>Password</label><input id="userPassword" value="${esc(u.password)}"></div><div class="col"><label>الدور</label><select id="userRole"><option value="admin" ${u.role==='admin'?'selected':''}>Admin</option><option value="cashier" ${u.role!=='admin'?'selected':''}>Cashier</option></select></div><label class="row"><input id="userActive" type="checkbox" ${u.active!==false?'checked':''} style="width:auto"> فعال</label></div><br><button data-action="save-user" data-id="${id||''}">حفظ</button>`)}
function startModal(deviceId){const opts=state.devices.filter(d=>d.active!==false&&!state.activeSessions[d.id]).map(d=>`<option value="${d.id}" ${d.id===deviceId?'selected':''}>${esc(d.name)}</option>`).join('');openModal(`<div class="section-title"><div class="big">بدء جلسة</div><button class="btn-gray" data-action="close-modal">إغلاق</button></div><div class="grid grid-2"><div class="col"><label>الجهاز</label><select id="startDevice">${opts}</select></div><div class="col"><label>نوع الجلسة</label><select id="startType"><option value="single">Single</option><option value="multi">Multi</option></select></div><div class="col"><label>نظام الوقت</label><select id="timeMode"><option value="fixed">مدة محددة</option><option value="open">وقت مفتوح</option></select></div><div class="col"><label>المدة بالدقائق</label><select id="duration"><option value="15">15 دقيقة</option><option value="30">30 دقيقة</option><option value="60">1 ساعة</option><option value="120">2 ساعة</option><option value="180">3 ساعات</option><option value="custom">مدة مخصصة</option></select></div><div class="col"><label>مدة مخصصة</label><input id="customDuration" type="number" value="60"></div><div class="col"><label>اسم العميل</label><input id="customerName" placeholder="اختياري"></div><div class="col"><label>عدد اللاعبين</label><input id="playersCount" type="number" value="1"></div><div class="col"><label>ملاحظات</label><input id="sessionNotes"></div></div><br><button class="btn-green" data-action="save-start-session">تشغيل</button>`)}
function drinkModal(deviceId){const s=state.activeSessions[deviceId];if(!s)return toast('لا توجد جلسة مفتوحة','warn');let prod=state.products.filter(p=>p.active).map(p=>`<option value="${p.id}">${esc(p.name)} - ${money(p.price)}</option>`).join('');openModal(`<div class="section-title"><div class="big">إضافة مشروبات - ${esc(s.deviceName)}</div><button class="btn-gray" data-action="close-modal">إغلاق</button></div><div class="grid grid-2"><div class="col"><label>الصنف</label><select id="drinkProduct">${prod}</select></div><div class="col"><label>الكمية</label><input id="drinkQty" type="number" value="1"></div></div><br><button data-action="save-drink" data-device="${deviceId}">إضافة</button><br><br>${(s.items||[]).length?`<div class="table-wrap"><table><tr><th>الصنف</th><th>الكمية</th><th>الإجمالي</th></tr>${s.items.map(i=>`<tr><td>${esc(i.name)}</td><td>${i.qty}</td><td>${money(i.total)}</td></tr>`).join('')}</table></div>`:'<div class="empty">لا توجد مشروبات على الجلسة.</div>'}`)}
function extendModal(deviceId){openModal(`<div class="section-title"><div class="big">تمديد الجلسة</div><button class="btn-gray" data-action="close-modal">إغلاق</button></div><div class="grid grid-2"><button data-action="save-extend" data-device="${deviceId}" data-min="15">+15 دقيقة</button><button data-action="save-extend" data-device="${deviceId}" data-min="30">+30 دقيقة</button><button data-action="save-extend" data-device="${deviceId}" data-min="60">+1 ساعة</button><div class="col"><label>مخصص</label><input id="extendCustom" type="number" value="15"></div></div><br><button data-action="save-extend-custom" data-device="${deviceId}">تمديد مخصص</button>`)}
function endSessionModal(deviceId){const s=state.activeSessions[deviceId];if(!s)return;let play=sessionPlayTotal(s),drinks=sessionDrinksTotal(s);openModal(`<div class="section-title"><div class="big">إنهاء جلسة - ${esc(s.deviceName)}</div><button class="btn-gray" data-action="close-modal">إغلاق</button></div><div class="card"><div>اللعب: <b>${money(play)}</b></div><div>المشروبات: <b>${money(drinks)}</b></div><div>الإجمالي: <b>${money(play+drinks)}</b></div></div><br><div class="grid grid-2"><div class="col"><label>طريقة الدفع</label><select id="paymentMethod"><option>Cash</option><option>Vodafone Cash</option><option>Visa</option><option>Instapay</option><option>Mixed</option></select></div><div class="col"><label>خصم</label><input id="discount" type="number" value="0"></div><div class="col"><label>المدفوع</label><input id="paidAmount" type="number" value="${money(play+drinks)}"></div></div><br><button class="btn-green" data-action="confirm-end-session" data-device="${deviceId}">حفظ الفاتورة وإنهاء</button>`)}
function invoiceDetails(id){const i=state.invoices.find(x=>x.id===id);if(!i)return;openModal(`<div id="invoicePrint"><div class="big">فاتورة #${i.no}</div><p>${fmt(i.createdAt)}</p><p>الجهاز: ${esc(i.deviceName)} | ${esc(i.sessionType)}</p><div class="table-wrap"><table><tr><th>البند</th><th>الإجمالي</th></tr><tr><td>اللعب</td><td>${money(i.playTotal)}</td></tr><tr><td>المشروبات</td><td>${money(i.drinksTotal)}</td></tr><tr><td>خصم</td><td>${money(i.discount)}</td></tr><tr><th>الإجمالي</th><th>${money(i.total)}</th></tr></table></div>${(i.items||[]).length?`<h3>المشروبات</h3><ul>${i.items.map(x=>`<li>${esc(x.name)} × ${x.qty} = ${money(x.total)}</li>`).join('')}</ul>`:''}</div><br><button data-action="print-current-invoice">طباعة</button> <button class="btn-gray" data-action="close-modal">إغلاق</button>`)}
function handleLogin(){let u=document.getElementById('loginUser').value.trim().toLowerCase(),p=document.getElementById('loginPass').value;let user=state.users.find(x=>String(x.username).toLowerCase()===u&&String(x.password)===String(p)&&x.active!==false);if(!user){document.getElementById('loginMsg').textContent='بيانات الدخول غير صحيحة';return}currentUser=user;document.getElementById('loginPage').classList.add('hidden');document.getElementById('appPage').classList.remove('hidden');setStatus(getSettings().status||'Offline Local','gray');render();startTick()}
function logout(){currentUser=null;document.getElementById('appPage').classList.add('hidden');document.getElementById('loginPage').classList.remove('hidden');clearInterval(tickTimer)}
function startTick(){clearInterval(tickTimer);tickTimer=setInterval(()=>{if(currentTab==='dashboard')render()},30000)}
function saveProduct(id){let data={name:val('prodName'),category:val('prodCategory'),price:num('prodPrice'),stockQty:num('prodStock'),minStock:num('prodMin'),trackStock:checked('prodTrack'),active:true};if(!data.name)return toast('اكتب اسم الصنف','warn');if(id){Object.assign(state.products.find(p=>p.id===id),data)}else{state.products.push({id:uid(),soldQty:0,...data})}commit('تم حفظ المشروب');closeModal();render()}
function saveDevice(id){let data={name:val('devName'),singlePrice:num('devSingle'),multiPrice:num('devMulti'),status:val('devStatus'),active:checked('devActive')};if(!data.name)return toast('اكتب اسم الجهاز','warn');if(id){Object.assign(state.devices.find(d=>d.id===id),data)}else{state.devices.push({id:uid(),...data})}commit('تم حفظ الجهاز');closeModal();render()}
function saveExpense(id){let data={date:val('expDate')||today(),category:val('expCat')||'عام',note:val('expNote'),amount:num('expAmount')};if(id){Object.assign(state.expenses.find(e=>e.id===id),data)}else{state.expenses.push({id:uid(),createdAt:nowISO(),...data})}commit('تم حفظ المصروف');closeModal();render()}
function saveUser(id){let data={name:val('userName'),username:val('userUsername'),password:val('userPassword'),role:val('userRole'),active:checked('userActive')};if(!data.username||!data.password)return toast('اسم المستخدم وكلمة المرور مطلوبان','warn');if(id){Object.assign(state.users.find(u=>u.id===id),data)}else{state.users.push({id:uid(),...data})}commit('تم حفظ المستخدم');closeModal();render()}
function saveStartSession(){let deviceId=val('startDevice'),d=state.devices.find(x=>x.id===deviceId);if(!d)return;let type=val('startType'),mode=val('timeMode'),dur=val('duration')==='custom'?num('customDuration'):num('duration');let price=type==='multi'?d.multiPrice:d.singlePrice;state.activeSessions[deviceId]={id:uid(),deviceId,deviceName:d.name,sessionType:type,timeMode:mode,durationMinutes:mode==='fixed'?dur:0,startedAt:nowISO(),customerName:val('customerName'),playersCount:num('playersCount')||1,notes:val('sessionNotes'),pricePerHour:price,status:'open',items:[]};d.status='busy';commit('تم بدء الجلسة');closeModal();render()}
function saveDrink(deviceId){let s=state.activeSessions[deviceId],p=state.products.find(x=>x.id===val('drinkProduct')),qty=num('drinkQty')||1;if(!s||!p)return;if(p.trackStock&&p.stockQty<qty)return toast('المخزون غير كاف','warn');s.items=s.items||[];s.items.push({productId:p.id,name:p.name,qty,unitPrice:p.price,total:qty*p.price});commit('تم إضافة المشروب');closeModal();render()}
function saveExtend(deviceId,mins){let s=state.activeSessions[deviceId];if(!s)return;if(s.timeMode!=='fixed'){s.timeMode='fixed';s.durationMinutes=minutesBetween(s.startedAt,new Date())}s.durationMinutes=Number(s.durationMinutes||0)+Number(mins||0);commit('تم تمديد الجلسة');closeModal();render()}
function confirmEndSession(deviceId){let s=state.activeSessions[deviceId],d=state.devices.find(x=>x.id===deviceId);if(!s)return;let play=sessionPlayTotal(s),drinks=sessionDrinksTotal(s),discount=num('discount'),total=Math.max(0,play+drinks-discount),paid=num('paidAmount');(s.items||[]).forEach(it=>{let p=state.products.find(x=>x.id===it.productId);if(p){p.soldQty=Number(p.soldQty||0)+Number(it.qty||0);if(p.trackStock)p.stockQty=Math.max(0,Number(p.stockQty||0)-Number(it.qty||0))}});let inv={id:uid(),no:state.nextInvoice++,createdAt:nowISO(),deviceId,deviceName:s.deviceName,sessionType:s.sessionType,timeMode:s.timeMode,start:s.startedAt,end:nowISO(),durationMinutes:s.timeMode==='fixed'?Number(s.durationMinutes||0):minutesBetween(s.startedAt,new Date()),items:s.items||[],playTotal:play,drinksTotal:drinks,discount,total,paid,remaining:Math.max(0,total-paid),paymentMethod:val('paymentMethod'),userId:currentUser.id};state.invoices.push(inv);delete state.activeSessions[deviceId];if(d)d.status='available';commit('تم حفظ الفاتورة');closeModal();render()}
function val(id){return document.getElementById(id)?.value||''} function num(id){return Number(val(id)||0)} function checked(id){return !!document.getElementById(id)?.checked}
function commit(msg){saveState();markQueue(msg);toast(msg,'ok')}
function getQueue(){try{return JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]')}catch(e){return[]}} function setQueue(q){localStorage.setItem(QUEUE_KEY,JSON.stringify(q))} function markQueue(summary){if(getSettings().mode==='hybrid'){let q=getQueue();q.push({id:uid(),time:nowISO(),summary,state});setQueue(q.slice(-30))}}
async function supabaseRequest(method,path,body){let s=getSettings(),base=normalizeSupabaseUrl(s.url),key=cleanSupabaseKey(s.key);if(!base||!key)throw new Error('config');if(!base.includes('.supabase.co'))throw new Error('bad_url');let headers={'apikey':key,'Content-Type':'application/json'};if(method==='POST')headers.Prefer='resolution=merge-duplicates,return=representation';let r=await fetch(base+'/rest/v1/'+path,{method,headers,body:body?JSON.stringify(body):undefined});if(!r.ok){let text=await r.text();if(text.includes('Could not find')||text.includes('ps_cafe_state'))throw new Error('missing_table');if(r.status===405)throw new Error('not_allowed');throw new Error('sync_failed')}return r.json()}
async function syncNow(){let s=getSettings();if(s.mode!=='hybrid')return toast('المزامنة غير مفعلة. الوضع الحالي Offline Local','warn');try{await supabaseRequest('POST','ps_cafe_state',[{id:'main',data:state,updated_at:nowISO()}]);let ts=nowISO();saveSettingsObj({...s,status:'Online Synced',lastSync:ts});setStatus('Online Synced','ok');setQueue([]);toast('تمت المزامنة بنجاح مع Supabase - آخر مزامنة: '+shortTime(ts),'ok');render()}catch(e){let msg='تعذر الاتصال بـ Supabase، يعمل البرنامج الآن في الوضع المحلي Offline.';if(e.message==='missing_table')msg='لم يتم العثور على جدول ps_cafe_state في Supabase. يعمل البرنامج محليًا.';if(e.message==='config')msg='إعدادات Supabase غير مكتملة. يعمل البرنامج محليًا.';saveSettingsObj({...s,status:'Sync Failed'});setStatus('Sync Failed','warn');toast(msg,'warn');render()}}
function saveSyncSettings(){let s={...getSettings(),mode:val('syncMode'),url:normalizeSupabaseUrl(val('supabaseUrl')),key:cleanSupabaseKey(val('supabaseKey'))};if(s.url&&!s.url.includes('.supabase.co'))return toast('رابط Supabase غير صحيح. أدخل Project URL فقط.','warn');saveSettingsObj(s);toast('تم حفظ إعدادات المزامنة','ok');render()} function saveTheme(){state.settings.theme=val('themeMode');state.settings.brightness=num('brightness')||100;commit('تم حفظ المظهر');render()} function restoreSyncDefaults(){saveSettingsObj({...DEFAULT_SUPABASE_CONFIG});toast('تم استعادة إعدادات Supabase الافتراضية','ok');render()} function clearSyncSettings(){saveSettingsObj({mode:'offline',url:'',key:'',status:'Offline Local'});setStatus('Offline Local','');toast('تم مسح إعدادات Supabase','ok');render()}
function printCurrentInvoice(){window.print()} function toggleProduct(id){let p=state.products.find(x=>x.id===id);if(p){p.active=!p.active;commit('تم تحديث حالة المنتج');render()}}
function onClick(e){const btn=e.target.closest('[data-action]');if(!btn)return;const a=btn.dataset.action;const id=btn.dataset.id;const dev=btn.dataset.device;try{if(a==='login')handleLogin();else if(a==='logout')logout();else if(a==='show-tab')showTab(btn.dataset.tab);else if(a==='open-drawer')openDrawer();else if(a==='close-drawer')closeDrawer();else if(a==='close-modal')closeModal();else if(a==='open-start')startModal(dev);else if(a==='save-start-session')saveStartSession();else if(a==='add-drink')drinkModal(dev);else if(a==='save-drink')saveDrink(dev);else if(a==='extend-session')extendModal(dev);else if(a==='save-extend')saveExtend(dev,btn.dataset.min);else if(a==='save-extend-custom')saveExtend(dev,num('extendCustom'));else if(a==='end-session')endSessionModal(dev);else if(a==='confirm-end-session')confirmEndSession(dev);else if(a==='open-product')productModal();else if(a==='edit-product')productModal(id);else if(a==='save-product')saveProduct(id);else if(a==='toggle-product')toggleProduct(id);else if(a==='open-device')deviceModal();else if(a==='edit-device')deviceModal(id);else if(a==='save-device')saveDevice(id);else if(a==='open-expense')expenseModal();else if(a==='edit-expense')expenseModal(id);else if(a==='save-expense')saveExpense(id);else if(a==='open-user')userModal();else if(a==='edit-user')userModal(id);else if(a==='save-user')saveUser(id);else if(a==='invoice-details')invoiceDetails(id);else if(a==='print-invoice')invoiceDetails(id);else if(a==='print-current-invoice')printCurrentInvoice();else if(a==='sync-now')syncNow();else if(a==='save-sync-settings')saveSyncSettings();else if(a==='save-theme')saveTheme();else if(a==='restore-sync-defaults')restoreSyncDefaults();else if(a==='clear-sync-settings')clearSyncSettings();}catch(err){console.error(err);toast('حدث خطأ في تنفيذ الأمر: '+err.message,'bad')}}
document.addEventListener('click',e=>{if(e.target.id==='modalBackdrop')closeModal();});document.addEventListener('click',onClick,true);document.addEventListener('input',e=>{if(e.target.id==='brightness'){document.documentElement.style.setProperty('--brightness',e.target.value+'%')}});window.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeDrawer()}});if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(console.warn))}
window.__PS_APP__={state,render,showTab,syncNow};
})();
</script>
