<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563eb">
<meta name="description" content="Hybrid offline/online cafe management system">
<link rel="manifest" href="/manifest.json">
<title>PlayStation Cafe Manager V5 Fixed</title>
<style>
body{margin:0;font-family:Tahoma,Arial;background:#0f172a;color:#fff}.hidden{display:none!important}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:15px}.box,.card{background:#111827;border:1px solid #334155;border-radius:18px;padding:18px;box-shadow:0 15px 40px #0008}.box{width:min(430px,100%)}input,select,button,textarea{font-family:inherit;font-size:15px;border-radius:12px;border:1px solid #334155;padding:10px;background:#020617;color:#fff}button{background:#2563eb;border-color:#2563eb;cursor:pointer;font-weight:bold}.ok{background:#22c55e;border-color:#22c55e;color:#052e16}.danger{background:#ef4444;border-color:#ef4444}.gray{background:#334155}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.col{display:flex;flex-direction:column;gap:7px}.grid{display:grid;gap:12px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g5{grid-template-columns:repeat(5,1fr)}.top{position:sticky;top:0;background:#020617ee;border-bottom:1px solid #334155;padding:10px 14px;display:flex;justify-content:space-between;z-index:10}.tabs{display:flex;gap:6px;overflow:auto;padding:10px;background:#111827}.tab{white-space:nowrap;background:#1e293b}.tab.active{background:#2563eb}.content{padding:14px;max-width:1300px;margin:auto}.big{font-size:22px;font-weight:900}.muted{color:#94a3b8}.small{font-size:12px}.badge{padding:4px 8px;border-radius:999px;font-size:12px;background:#334155}.b-ok{background:#14532d}.b-busy{background:#78350f}.b-bad{background:#7f1d1d}.price{font-size:24px;font-weight:900}table{width:100%;border-collapse:collapse;min-width:650px}th,td{border-bottom:1px solid #334155;padding:9px;text-align:right}th{background:#020617}.tw{overflow:auto;border:1px solid #334155;border-radius:12px}.modal{position:fixed;inset:0;background:#000a;display:flex;align-items:center;justify-content:center;padding:12px;z-index:99}.modal .box{max-height:92vh;overflow:auto;width:min(760px,100%)}.kpi{background:#020617;border:1px solid #334155;border-radius:16px;padding:12px}.kpi b{font-size:24px;display:block;margin-top:5px}.sync{font-size:12px;background:#334155;padding:4px 8px;border-radius:99px}.sync.on{background:#14532d}.sync.warn{background:#78350f}.sync.err{background:#7f1d1d}@media(max-width:850px){.g2,.g3,.g5{grid-template-columns:1fr}.top{flex-direction:column;gap:8px}.row>*{flex:1 1 100%}button{width:100%}}@media print{.top,.tabs,button,.no-print{display:none!important}body{background:white;color:black}.card,.box{box-shadow:none;background:white;color:black;border:1px solid #ccc}}
</style></head>
<body>
<div id="login" class="login"><div class="box"><div class="big">🎮 PlayStation Cafe Manager V5 Fixed</div><p class="muted">Hybrid Offline Queue + Auto Sync</p><div class="col"><label>اسم المستخدم</label><input id="lu" value="admin"><label>كلمة المرور</label><input id="lp" type="password" value="1234"><button onclick="login()">دخول</button><div id="lm" class="small" style="color:#fca5a5"></div></div></div></div>
<div id="app" class="hidden"><div class="top"><div><div class="big">🎮 PlayStation Cafe Manager</div><div class="small muted">المستخدم: <span id="cu"></span> | <span id="cr"></span> | <span id="sl" class="sync">Offline</span></div></div><div class="row no-print"><button class="gray" onclick="manualSync()">مزامنة</button><button class="danger" onclick="logout()">خروج</button></div></div><div id="tabs" class="tabs no-print"></div><div class="content"><section id="vDashboard"></section><section id="vProducts" class="hidden"></section><section id="vDevices" class="hidden"></section><section id="vInvoices" class="hidden"></section><section id="vExpenses" class="hidden"></section><section id="vReports" class="hidden"></section><section id="vUsers" class="hidden"></section><section id="vSettings" class="hidden"></section></div></div>
<div id="modal" class="modal hidden"><div id="mc" class="box"></div></div>
<script>
const K='ps_cafe_v4_state', SK='ps_cafe_v4_settings', QK='ps_cafe_v4_sync_queue';let state,user=null,tab='Dashboard',dirty=false,timer=null;
function id(){return 'id_'+Math.random().toString(36).slice(2)+Date.now().toString(36)}
function def(){return{users:[{id:id(),username:'admin',password:'1234',role:'Admin',active:true},{id:id(),username:'cashier',password:'1234',role:'Cashier',active:true}],devices:[1,2,3,4,5].map(n=>({id:'ps'+n,name:'PS '+n,status:'available',singleRate:60,multiRate:90})),products:['شاي:15','قهوة:25','نسكافيه:30','مياه:10','عصير:20','كانز:25'].map(x=>{let a=x.split(':');return{id:id(),name:a[0],price:+a[1],stock:0,active:true}}),sessions:[],invoices:[],expenses:[],nextInvoice:1,updatedAt:new Date().toISOString()}}
function load(){try{state=JSON.parse(localStorage.getItem(K))||def()}catch(e){state=def()}save(false)}function save(md=true){state.updatedAt=new Date().toISOString();try{localStorage.setItem(K,JSON.stringify(state))}catch(e){console.warn('localStorage save failed:',e.message)}if(md){dirty=true;markPending('تغيير محلي');sched()}render()}function st(){try{return JSON.parse(localStorage.getItem(SK))||{mode:'offline',url:'',key:''}}catch(e){return{mode:'offline',url:'',key:''}}}function setst(s){try{localStorage.setItem(SK,JSON.stringify(s))}catch(e){console.warn('localStorage setst failed:',e.message)}setup();render()}
function money(n){return (Number(n)||0).toFixed(2)}function fmt(d){return d?new Date(d).toLocaleString('ar-EG'):''}function today(){return new Date().toISOString().slice(0,10)}function val(x){return document.getElementById(x)?.value||''}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function isFileProtocol(){return location.protocol==='file:'}
function admin(){return user&&user.role==='Admin'}
function login(){let u=val('lu').trim().toLowerCase(),p=val('lp');let x=state.users.find(a=>a.username.toLowerCase()==u&&a.password==p&&a.active);if(!x){lm.textContent='بيانات الدخول غير صحيحة';return}user=x;document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');tab='Dashboard';tabs();setup();render()}function logout(){user=null;document.getElementById('app').classList.add('hidden');document.getElementById('login').classList.remove('hidden')}
function tabs(){let all=[['Dashboard','الرئيسية'],['Products','المشروبات'],['Devices','الأجهزة والأسعار'],['Invoices','الفواتير'],['Expenses','المصروفات'],['Reports','التقارير'],['Users','المستخدمين'],['Settings','الإعدادات/المزامنة']];let v=all.filter(t=>admin()||!['Devices','Expenses','Reports','Users','Settings'].includes(t[0]));document.getElementById('tabs').innerHTML=v.map(t=>`<button class="tab ${tab==t[0]?'active':''}" onclick="show('${t[0]}')">${t[1]}</button>`).join('')}
function show(t){tab=t;tabs();render()}function render(){if(!user)return;cu.textContent=user.username;cr.textContent=user.role;let ss=st();let q=queue().length, online=navigator.onLine;sl.textContent=ss.mode==='supabase'?(online?(q?'Online - Pending '+q:'Online Synced'):'Offline Mode - Pending '+q):'Offline Local';sl.className='sync '+(ss.mode==='supabase'?(online?(q?'warn':'on'):'err'):'');['Dashboard','Products','Devices','Invoices','Expenses','Reports','Users','Settings'].forEach(x=>document.getElementById('v'+x).classList.add('hidden'));document.getElementById('v'+tab).classList.remove('hidden');rDash();rProducts();rDevices();rInvoices();rExpenses();rReports();rUsers();rSettings()}
setInterval(()=>{if(user&&tab==='Dashboard')rDash()},1000)
function sess(did){return state.sessions.find(s=>s.deviceId===did&&s.status==='open')}function cost(s){let m=Math.max(1,Math.ceil((Date.now()-new Date(s.start))/60000));let d=state.devices.find(x=>x.id===s.deviceId)||{},rate=s.mode==='multi'?d.multiRate:d.singleRate,play=m/60*(+rate||0),dr=(s.items||[]).reduce((a,i)=>a+i.price*i.qty,0);return{m,play,dr,total:play+dr}}function badge(d){let c=d.status==='available'?'b-ok':d.status==='busy'?'b-busy':'b-bad',t=d.status==='available'?'متاح':d.status==='busy'?'مشغول':'صيانة';return `<span class="badge ${c}">${t}</span>`}
function rDash(){vDashboard.innerHTML=`<div class="card"><div class="row" style="justify-content:space-between"><div><div class="big">لوحة التشغيل</div><div class="muted">تشغيل وإيقاف الأجهزة وإضافة المشروبات</div></div><button class="ok" onclick="startModal()">بدء جلسة</button></div></div><br><div class="grid g5">${state.devices.map(d=>{let s=sess(d.id),c=s?cost(s):null;return `<div class="card"><div class="row" style="justify-content:space-between"><div class="big">${d.name}</div>${badge(d)}</div><div class="small muted">Single ${money(d.singleRate)} / Multi ${money(d.multiRate)}</div>${s?`<hr><div>العميل: <b>${s.customer||'-'}</b></div><div>النظام: <b>${s.mode==='multi'?'Multi':'Single'}</b></div><div>البداية: ${fmt(s.start)}</div><div class="price">${c.m} دقيقة</div><div>لعب: ${money(c.play)} | مشروبات: ${money(c.dr)}</div><div class="big">الإجمالي: ${money(c.total)}</div><div class="row"><button onclick="drinkModal('${s.id}')">مشروبات</button><button class="danger" onclick="endSession('${s.id}')">إنهاء</button></div>`:d.status==='available'?`<button class="ok" onclick="startModal('${d.id}')">تشغيل</button>`:`<p class="muted">غير متاح</p>`}</div>`}).join('')}</div>`}
function startModal(did=''){let av=state.devices.filter(d=>d.status==='available'&&!sess(d.id));modal(`<div class="big">بدء جلسة</div><div class="grid g2"><div class="col"><label>الجهاز</label><select id="sd">${av.map(d=>`<option value="${d.id}" ${d.id==did?'selected':''}>${d.name}</option>`)}</select></div><div class="col"><label>اسم العميل</label><input id="sc"></div><div class="col"><label>نوع التشغيل</label><select id="sm"><option value="single">Single</option><option value="multi">Multi</option></select></div></div><br><div class="row"><button class="ok" onclick="start()">بدء</button><button class="gray" onclick="closeM()">إلغاء</button></div>`)}
function start(){let did=val('sd');if(!did)return alert('اختار جهاز');state.sessions.push({id:id(),deviceId:did,customer:val('sc'),mode:val('sm'),items:[],start:new Date().toISOString(),status:'open',user:user.username});state.devices.find(d=>d.id==did).status='busy';closeM();save()}
function drinkModal(sid){let s=state.sessions.find(x=>x.id==sid);if(!s){alert('الجلسة غير موجودة');return;}modal(`<div class="big">مشروبات الجلسة</div><div class="grid g3"><select id="dp">${state.products.filter(p=>p.active).map(p=>`<option value="${p.id}">${p.name} - ${money(p.price)}</option>`).join('')}</select><input id="dq" type="number" value="1"><button class="ok" onclick="addDrink('${sid}')">إضافة</button></div><br><div class="tw"><table><tr><th>الصنف</th><th>كمية</th><th>سعر</th><th>إجمالي</th><th></th></tr>${(s.items||[]).map((i,n)=>`<tr><td>${i.name}</td><td>${i.qty}</td><td>${money(i.price)}</td><td>${money(i.price*i.qty)}</td><td><button class="danger" onclick="remDrink('${sid}',${n})">حذف</button></td></tr>`).join('')}</table></div><br><button class="gray" onclick="closeM()">إغلاق</button>`)}
function addDrink(sid){let s=state.sessions.find(x=>x.id==sid),p=state.products.find(x=>x.id==val('dp')),q=+val('dq')||1;if(!s){alert('الجلسة غير موجودة');return;}if(!p){alert('المنتج غير موجود');return;}s.items.push({productId:p.id,name:p.name,price:+p.price,qty:q});save();drinkModal(sid)}function remDrink(sid,n){let s=state.sessions.find(x=>x.id==sid);if(!s){alert('الجلسة غير موجودة');return;}if(!Array.isArray(s.items)||n<0||n>=s.items.length){return;}s.items.splice(n,1);save();drinkModal(sid)}
function endSession(sid){let s=state.sessions.find(x=>x.id==sid);if(!s){alert('الجلسة غير موجودة');return;}let d=state.devices.find(x=>x.id==s.deviceId);if(!d){alert('الجهاز غير موجود');return;}let c=cost(s);let inv={id:id(),no:state.nextInvoice++,date:new Date().toISOString(),deviceId:d.id,deviceName:d.name,customer:s.customer,mode:s.mode,start:s.start,end:new Date().toISOString(),minutes:c.m,playTotal:+c.play.toFixed(2),drinkTotal:+c.dr.toFixed(2),total:+c.total.toFixed(2),items:s.items,payment:'Cash',user:user.username};s.status='closed';s.end=inv.end;d.status='available';state.invoices.push(inv);save();showInv(inv.id)}
function showInv(iid){let i=state.invoices.find(x=>x.id==iid);modal(`<div class="big">فاتورة رقم ${i.no}</div><p>التاريخ: ${fmt(i.date)}</p><p>الجهاز: ${i.deviceName} | ${i.mode}</p><p>المدة: ${i.minutes} دقيقة</p><hr><p>اللعب: ${money(i.playTotal)}</p><p>المشروبات: ${money(i.drinkTotal)}</p><div class="big">الإجمالي: ${money(i.total)}</div><br><button onclick="window.print()">طباعة</button> <button class="gray" onclick="closeM()">إغلاق</button>`)}
function rProducts(){vProducts.innerHTML=`<div class="card"><div class="row" style="justify-content:space-between"><div class="big">المشروبات</div><button class="ok" onclick="prodModal()">إضافة</button></div></div><br><div class="tw"><table><tr><th>الاسم</th><th>السعر</th><th>المخزون</th><th>فعال</th><th></th></tr>${state.products.map(p=>`<tr><td>${p.name}</td><td>${money(p.price)}</td><td>${p.stock}</td><td>${p.active?'نعم':'لا'}</td><td><button onclick="prodModal('${p.id}')">تعديل</button></td></tr>`).join('')}</table></div>`}
function prodModal(pid=''){let p=state.products.find(x=>x.id==pid)||{name:'',price:0,stock:0,active:true};modal(`<div class="big">منتج</div><div class="grid g2"><input id="pn" value="${esc(p.name)}" placeholder="الاسم"><input id="pp" type="number" value="${p.price}" placeholder="السعر"><input id="ps" type="number" value="${p.stock}" placeholder="المخزون"><select id="pa"><option value="true" ${p.active?'selected':''}>فعال</option><option value="false" ${!p.active?'selected':''}>غير فعال</option></select></div><br><button class="ok" onclick="saveProd('${pid}')">حفظ</button> <button class="gray" onclick="closeM()">إلغاء</button>`)}
function saveProd(pid){let o={name:val('pn'),price:+val('pp'),stock:+val('ps'),active:val('pa')==='true'};if(pid)Object.assign(state.products.find(x=>x.id==pid),o);else state.products.push({id:id(),...o});closeM();save()}
function rDevices(){vDevices.innerHTML=`<div class="card"><div class="big">الأجهزة والأسعار</div></div><br><div class="tw"><table><tr><th>الجهاز</th><th>الحالة</th><th>Single</th><th>Multi</th><th>تغيير</th><th></th></tr>${state.devices.map(d=>`<tr><td><input id="dn${d.id}" value="${esc(d.name)}"></td><td>${badge(d)}</td><td><input id="ds${d.id}" type="number" value="${d.singleRate}"></td><td><input id="dm${d.id}" type="number" value="${d.multiRate}"></td><td><select id="dt${d.id}"><option value="available" ${d.status==='available'?'selected':''}>متاح</option><option value="maintenance" ${d.status==='maintenance'?'selected':''}>صيانة</option><option value="busy" ${d.status==='busy'?'selected':''}>مشغول</option></select></td><td><button onclick="saveDev('${d.id}')">حفظ</button></td></tr>`).join('')}</table></div>`}
function saveDev(did){let d=state.devices.find(x=>x.id==did);if(sess(did)&&val('dt'+did)!=='busy')return alert('الجهاز عليه جلسة مفتوحة');d.name=val('dn'+did);d.singleRate=+val('ds'+did);d.multiRate=+val('dm'+did);d.status=val('dt'+did);save()}
function rInvoices(){vInvoices.innerHTML=`<div class="card"><div class="big">الفواتير</div></div><br><div class="tw"><table><tr><th>رقم</th><th>تاريخ</th><th>جهاز</th><th>عميل</th><th>مدة</th><th>إجمالي</th><th></th></tr>${[...state.invoices].reverse().map(i=>`<tr><td>${i.no}</td><td>${fmt(i.date)}</td><td>${i.deviceName}</td><td>${i.customer||'-'}</td><td>${i.minutes}</td><td>${money(i.total)}</td><td><button onclick="showInv('${i.id}')">عرض</button></td></tr>`).join('')}</table></div>`}
function rExpenses(){vExpenses.innerHTML=`<div class="card"><div class="row" style="justify-content:space-between"><div class="big">المصروفات</div><button class="ok" onclick="expModal()">إضافة</button></div></div><br><div class="tw"><table><tr><th>تاريخ</th><th>نوع</th><th>بيان</th><th>مبلغ</th><th></th></tr>${state.expenses.map(e=>`<tr><td>${e.date}</td><td>${e.type}</td><td>${e.note}</td><td>${money(e.amount)}</td><td><button class="danger" onclick="delExp('${e.id}')">حذف</button></td></tr>`).join('')}</table></div>`}function expModal(){modal(`<div class="big">مصروف</div><div class="grid g2"><input id="ed" type="date" value="${today()}"><input id="et" placeholder="النوع"><input id="ea" type="number" placeholder="المبلغ"><input id="en" placeholder="البيان"></div><br><button class="ok" onclick="saveExp()">حفظ</button>`)}function saveExp(){state.expenses.push({id:id(),date:val('ed'),type:val('et'),amount:+val('ea'),note:val('en')});closeM();save()}function delExp(idv){state.expenses=state.expenses.filter(e=>e.id!==idv);save()}
function rReports(){let ti=state.invoices.filter(i=>i.date.slice(0,10)==today()),te=state.expenses.filter(e=>e.date==today()),play=ti.reduce((a,i)=>a+i.playTotal,0),dr=ti.reduce((a,i)=>a+i.drinkTotal,0),tot=ti.reduce((a,i)=>a+i.total,0),ex=te.reduce((a,e)=>a+e.amount,0);vReports.innerHTML=`<div class="card"><div class="big">تقرير اليوم</div></div><br><div class="grid g3"><div class="kpi">دخل اللعب<b>${money(play)}</b></div><div class="kpi">دخل المشروبات<b>${money(dr)}</b></div><div class="kpi">إجمالي الإيراد<b>${money(tot)}</b></div><div class="kpi">المصروفات<b>${money(ex)}</b></div><div class="kpi">الصافي<b>${money(tot-ex)}</b></div><div class="kpi">عدد الجلسات<b>${ti.length}</b></div></div>`}
function rUsers(){vUsers.innerHTML=`<div class="card"><div class="row" style="justify-content:space-between"><div class="big">المستخدمين</div><button class="ok" onclick="userModal()">إضافة</button></div></div><br><div class="tw"><table><tr><th>يوزر</th><th>صلاحية</th><th>فعال</th><th></th></tr>${state.users.map(u=>`<tr><td>${u.username}</td><td>${u.role}</td><td>${u.active?'نعم':'لا'}</td><td><button onclick="userModal('${u.id}')">تعديل</button></td></tr>`).join('')}</table></div>`}
function userModal(uid=''){let u=state.users.find(x=>x.id==uid)||{username:'',password:'1234',role:'Cashier',active:true};modal(`<div class="big">مستخدم</div><div class="grid g2"><input id="un" value="${esc(u.username)}" placeholder="username"><input id="up" value="${esc(u.password)}" placeholder="password"><select id="ur"><option ${u.role==='Admin'?'selected':''}>Admin</option><option ${u.role==='Cashier'?'selected':''}>Cashier</option></select><select id="ua"><option value="true" ${u.active?'selected':''}>فعال</option><option value="false" ${!u.active?'selected':''}>غير فعال</option></select></div><br><button class="ok" onclick="saveUser('${uid}')">حفظ</button>`)}function saveUser(uid){let n=val('un').trim();if(!n)return alert('اكتب اسم المستخدم');if(state.users.some(u=>u.username.toLowerCase()==n.toLowerCase()&&u.id!==uid))return alert('موجود');let o={username:n,password:val('up'),role:val('ur'),active:val('ua')==='true'};if(uid)Object.assign(state.users.find(x=>x.id==uid),o);else state.users.push({id:id(),...o});closeM();save()}
function rSettings(){let s=st();let fileProto=isFileProtocol();vSettings.innerHTML=`<div class="card"><div class="big">المزامنة Online</div><p class="muted">Hybrid Mode: لو النت فصل البرنامج يكمل Offline، ويحفظ العمليات في قائمة انتظار، ولما النت يرجع يعمل Auto Sync.</p>${fileProto?`<div class="kpi" style="background:#7f1d1d">⚠ البرنامج يعمل من ملف محلي. المزامنة عبر Supabase غير متاحة. استخدم Offline فقط.</div>`:''}<div class="kpi">حالة النت: <b>${navigator.onLine?'متصل':'غير متصل'}</b> | عمليات في الانتظار: <b>${queue().length}</b></div><br><div class="grid g2">${fileProto?`<input type="hidden" id="mode" value="offline"><div class="muted">النمط: <b>Offline فقط</b></div>`:` <select id="mode"><option value="offline" ${s.mode==='offline'?'selected':''}>Offline فقط</option><option value="supabase" ${s.mode==='supabase'?'selected':''}>Hybrid Supabase</option></select>`}<input id="url" value="${esc(s.url)}" placeholder="Supabase URL"><textarea id="key" rows="3" placeholder="anon key">${esc(s.key)}</textarea><button class="ok" onclick="saveSettings()">حفظ</button><button class="ok" onclick="manualSync()">مزامنة الآن</button><button onclick="showQueue()">عرض الانتظار</button><button onclick="exportBackup()">تصدير Backup</button><input type="file" onchange="importBackup(event)"><button class="danger" onclick="clearQueue()">مسح الانتظار</button><button class="danger" onclick="resetAll()">تصفير</button></div></div>`}
function saveSettings(){if(isFileProtocol()&&val('mode')==='supabase'){alert('لا يمكن استخدام Supabase من ملف محلي. استخدم Offline Local فقط.');return}setst({mode:val('mode'),url:val('url').trim().replace(/\/$/,''),key:val('key').trim()});alert('تم الحفظ')}function exportBackup(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='ps_backup_'+today()+'.json';a.click()}function isValidStateSchema(obj){if(!obj||typeof obj!=='object')return false;const req={users:'array',devices:'array',products:'array',sessions:'array',invoices:'array',expenses:'array',nextInvoice:'number',updatedAt:'string'};for(let k in req){if(!(k in obj))return false;if(req[k]==='array'&&!Array.isArray(obj[k]))return false;if(req[k]==='number'&&typeof obj[k]!=='number')return false;if(req[k]==='string'&&typeof obj[k]!=='string')return false}return true}function importBackup(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let imported=JSON.parse(r.result);if(!isValidStateSchema(imported)){alert('ملف النسخة الاحتياطية غير صحيح');return}state=imported;save()}catch(err){alert('خطأ في قراءة الملف')}};r.readAsText(f)}function resetAll(){if(confirm('حذف كل البيانات؟')){state=def();save()}}
function modal(h){document.getElementById('mc').innerHTML=h;document.getElementById('modal').classList.remove('hidden')}function closeM(){document.getElementById('modal').classList.add('hidden')}
function queue(){try{return JSON.parse(localStorage.getItem(QK))||[]}catch(e){return[]}}
function setQueue(q){try{localStorage.setItem(QK,JSON.stringify(q.slice(-50)))}catch(e){console.warn('localStorage setQueue failed:',e.message)}}
function markPending(summary){if(st().mode!=='supabase')return;let q=queue();q.push({id:id(),time:new Date().toISOString(),summary:summary||'تغيير',state:state});setQueue(q)}
function clearQueue(){if(confirm('مسح قائمة العمليات المنتظرة؟')){setQueue([]);dirty=false;render();alert('تم مسح قائمة الانتظار')}}
function showQueue(){let q=queue();modal(`<div class="big">قائمة انتظار المزامنة</div><p class="muted">هذه العمليات محفوظة على الجهاز وستُرفع تلقائيًا عند رجوع الإنترنت.</p>${q.length?`<div class="tw"><table><tr><th>الوقت</th><th>العملية</th></tr>${q.map(x=>`<tr><td>${fmt(x.time)}</td><td>${esc(x.summary)}</td></tr>`).join('')}</table></div>`:'<p>لا توجد عمليات منتظرة.</p>'}<br><button class="ok" onclick="manualSync()">مزامنة الآن</button> <button class="gray" onclick="closeM()">إغلاق</button>`)}
async function req(m,path,body){let s=st();if(!navigator.onLine)throw Error('لا يوجد اتصال بالإنترنت');if(!s.url||!s.key)throw Error('بيانات Supabase غير مكتملة');let r=await fetch(s.url+'/rest/v1/'+path,{method:m,headers:{apikey:s.key,Authorization:'Bearer '+s.key,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=representation'},body:body?JSON.stringify(body):undefined});if(!r.ok)throw Error(await r.text());return await r.json()}
async function loadCloud(){let rows=await req('GET','ps_cafe_state?id=eq.main&select=*');if(rows&&rows[0]&&!dirty&&queue().length===0){state=rows[0].data;try{localStorage.setItem(K,JSON.stringify(state))}catch(e){console.warn('localStorage loadCloud failed:',e.message)}render();return true}return !!(rows&&rows[0])}
async function saveCloud(){await req('POST','ps_cafe_state',[{id:'main',data:state,updated_at:new Date().toISOString()}]);dirty=false;setQueue([]);render();return true}
async function flushQueue(){if(st().mode!=='supabase')return false;if(!navigator.onLine)throw Error('النت غير متصل. تم حفظ العملية Offline وستتم المزامنة تلقائيًا.');let q=queue();if(q.length){state=q[q.length-1].state;try{localStorage.setItem(K,JSON.stringify(state))}catch(e){console.warn('localStorage flushQueue failed:',e.message)}}await saveCloud();return true}
async function manualSync(){if(isFileProtocol()){alert('المزامنة غير متاحة من ملف محلي. استخدم خادم HTTP أو Offline Local.');return}if(st().mode!=='supabase')return alert('فعل Hybrid Supabase من الإعدادات أولا');try{await flushQueue();await loadCloud();alert('تمت المزامنة بنجاح')}catch(e){render();alert('لم تتم المزامنة الآن: '+e.message)}}
function sched(){if(st().mode==='supabase'){clearTimeout(window.sd);window.sd=setTimeout(()=>flushQueue().catch(e=>{console.warn(e.message);render()}),1200)}}
function setup(){clearInterval(timer);window.removeEventListener('online',window.__psOnline||(()=>{}));window.__psOnline=()=>{if(st().mode==='supabase')flushQueue().catch(console.warn)};window.addEventListener('online',window.__psOnline);if(st().mode==='supabase')timer=setInterval(()=>{if(dirty||queue().length)flushQueue().catch(e=>{console.warn(e.message);render()});else loadCloud().catch(console.warn)},15000)}
load();setup();
</script></body></html>
